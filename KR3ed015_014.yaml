body:
  text: 卷第八傷寒時疫上治太陽中風陽脈浮陰脈弱發熱汗出惡寒鼻鳴乾嘔桂枝湯今傷風古方謂之中風桂枝湯桂枝去皮不見火芍藥各一兩半甘草一兩炙上粗末抄五錢水一盞半生薑三片棗一個同煎至八分去滓溫服若二三月病溫宜陽旦湯麻黃湯治太陽病頭痛發熱身疼惡風無汗而喘麻黃去節百沸湯泡去黃汁焙乾一兩半杏仁三十五枚去皮尖桂枝去皮不見火一兩甘草半兩炙上粗末每服五錢水一盞半煎至八分去滓溫服覆取微汗不須啜粥加減法傷寒熱病藥性須涼不可大溫夏至後麻黃湯須加知母半兩石膏一兩黃芩一分蓋麻黃湯性熱夏月服之有發黃斑出之失唯冬及春與病人素虛寒者乃用正方不有加減仲景論治傷寒一則桂枝二則麻黃三則大青龍桂枝治中風麻黃治傷寒大青龍治中風見寒脈傷寒見風脈三者如鼎立人皆能言之而不曉前人處方用藥之意故醫者多不用無足怪也且脈浮而緩者中風也故嗇嗇惡寒淅淅惡風翕翕發熱仲景以桂枝對之浮緊而澀者傷寒也故頭痛發熱身疼腰痛骨節疼痛惡寒無汗而喘仲景以麻黃對之至於中風脈浮緊傷寒脈浮緩仲景皆以大青龍對之何也余嘗深究此三者若證候與脈相對用之無不應手而愈何以言之風傷衛衛氣也寒傷榮榮血也榮行脈中衛行脈外風傷衛則風邪干陽氣陽氣不固發越而為汗是以自汗而表虛故仲景用桂枝以發其邪芍藥以和其血蓋中風則病在脈之外其病稍輕雖同曰發汗特解肌之藥耳故仲景於桂枝證云令遍身漐漐微似有汗者佳不可如水淋漓病必不除是知中風不可大發汗汗過則反動榮血邪氣乘虛而襲之故病不除也寒傷榮則寒邪入陰血而榮行脈中者也寒邪居脈中非特榮受病邪自內作則並與衛氣犯之久則浸淫及骨是以汗不出而熱齒乾以煩冤仲景以麻黃髮其汗又以桂枝甘草助其發散欲滌除內外之邪榮衛之病爾大抵二藥皆發汗以桂枝則發其衛之邪麻黃並榮衛治之亦自有深淺也何以驗之仲景桂枝第十九證云病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故爾以榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯又第四十七證云發熱汗出者此為榮弱衛強故使汗出欲散邪風者宜桂枝湯是知中風汗出者榮和而衛不和又第一卷云寸口脈浮而緊浮則為風緊則為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗是知傷寒脈浮緊者榮衛俱病也麻黃湯中並用桂枝此仲景之意也至於大青龍雖治傷風見寒脈傷寒見風脈之病然仲景云汗出惡風者不可服之服之厥逆便有筋惕肉瞤之證故大青龍一證尤難用須是形證諦當然後可行故王實大夫證治只用桂枝麻黃各半湯蓋審之也大青龍湯麻黃三兩去節湯泡去黃汁焙乾稱桂枝去皮不見火一兩杏仁二十枚去皮尖大棗五枚生薑一兩半切碎甘草一兩炙石膏如半雞子大碎上銼如麻豆大每服五錢水一盞半煮至八分去滓溫服取汗為度若汗周身潤止後服未周身潤可停待相次服盡不欲汗多恐亡陽故也若汗多不止用溫粉撲之溫粉方白朮藁本去苗淨洗川芎白芷不見火上細末每服一兩入米粉三兩和勻粉撲周身以止汗無藁本亦得若汗已出盡劑服必汗多亡陽厥逆惡風煩躁不得眠也桂枝加附子湯桂枝去皮不見火芍藥各一兩半甘草一兩炙附子半兩炮去皮臍上粗末抄五錢水一盞半生薑三片棗十個同煎至八分去滓溫服有一士人得太陽證因發汗汗不止惡風小便澀足攣曲而不伸豫診其脈浮而大浮為風大為虛豫曰在仲景方中有兩證大同而小異一則小便難一則小便數用藥稍差有千里之失仲景第七證云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯第十六證云傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆一則漏風小便難一則自汗小便數或惡風或惡寒病各不同也豫用第七證桂枝加附子湯三啜而汗止復佐以甘草芍藥湯足便得伸其第十六證治法見本方桂枝加厚朴杏子湯桂枝去皮不見火芍藥各一兩甘草六錢三字炙厚朴六錢三字去粗皮薑汁炙杏仁去皮尖十七個上銼如麻豆大抄五大錢水一盞半生薑五片肥棗二個擘破煎至八分去滓溫服覆取微汗戊申正月有一武臣為寇所執置舟中㶇板下數日得脫乘飢恣食良久解衣捫蝨次日遂作傷寒自汗而膈不利一醫作傷食而下之一醫作解衣中邪而汗之雜治數日漸覺昏困上喘息高醫者愴惶失措豫診之曰太陽病下之表未解微喘者桂枝加厚朴杏子湯此仲景之法也指令醫者急治藥一啜喘定再啜漐漐微汗至晚身涼而脈已和矣醫曰某平生不曾用仲景方不知其神捷如此豫曰仲景之法豈誑後人也哉人自寡學無以發明耳大柴胡湯柴胡二兩去苗洗黃芩去皮芍藥各三兩半夏六錢二字湯浸七次枳實二枚去穰麩炒大黃半兩伊尹湯液論大柴胡同薑棗共八味今監本無脫之也上粗末抄五錢水一盞半生薑五片肥棗一個擘破煎至八分去滓溫服以利為度未利再服嘗記有人病傷寒心煩喜嘔往來寒熱醫以小柴胡與之不除豫曰脈洪大而實熱結在裡小柴胡安能去之仲景云傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯三服而病除大黃蕩滌蘊熱傷寒中要藥王叔和云若不用大黃恐不名大柴胡大黃鬚是酒洗生用為有力昔後周姚僧垣名醫也帝因發熱欲服大黃藥僧垣曰大黃乃是快藥至尊年高不可輕用帝不從服之遂至不起及元帝有疾諸醫皆謂至尊至貴不可輕服宜用平藥僧垣曰脈洪而實必有宿食不用大黃必無瘥理元帝從之果下宿食乃愈合用與不合用必心下明得諦當然後可又記有人患傷寒身熱目痛鼻乾不得臥大便不通尺寸脈俱大已數日一夕汗出豫謂速以大柴胡下之醫駭曰陽明自汗津液已漏法當行蜜兌何苦須用大黃藥豫謂曰子只知抱穩若用大柴胡此仲景不傳之妙公安能知之豫力爭竟用大柴胡二服而愈仲景論陽明之病多汗者急下之人多謂已是自汗若更下之豈不表里俱虛又如論少陰證云少陰病一二日口乾燥者急下之人多謂病發於陰得之日淺但見乾燥若更下之豈不陰氣愈盛舉斯二者則其他疑惑處不可勝數此仲景之書世人罕讀也豫以為不然仲景稱急下之者亦猶急當救表急當救里凡稱急者有三處謂才覺汗多未至津液乾燥便速下之則為徑捷免致用蜜兌也若胸中識得了了方可無疑若未能了了誤用之反不若蜜兌為穩也又記一鄉人傷寒身熱大便不通煩渴鬱冒醫者用巴豆藥下之雖得溏利病宛然如舊豫視之陽明熱結在裡非大柴胡承氣等不可巴豆只去積安能蕩滌邪熱蘊毒邪急進大柴胡等三服得汗而解嘗謂仲景百一十三方為丸者有五理中陷胸抵當烏梅麻仁是以理中陷胸抵當皆大如彈子煮化而服與湯散無異至於麻仁治脾約烏梅治濕𧈟皆用小丸以達下部其他逐邪毒攻堅癖導瘀血潤燥屎之類皆憑湯劑未聞用巴豆小丸藥以下邪氣也既下而病不除不免重以大黃朴硝下之安能無損也哉局方云若身體疼痛是表證未解不可服白虎加蒼朮湯治濕溫多汗知母六兩甘草炙二合石膏一斤蒼朮三兩米泔浸粳米三兩上銼如麻豆大每服四大錢水一盞半煎至八分去滓取六分清汁溫服癸丑年故人王彥龍作毗陵倉官季夏得疾胸項多汗兩足逆冷譫語醫者不曉雜進藥已經旬日豫診之其脈關前濡關後數豫曰當作濕溫治蓋先受暑後受濕暑濕相摶是名濕溫先以白虎加人參湯次以白虎加蒼朮湯頭痛漸退足漸溫汗漸止三日愈此病名賊邪誤用藥有死之理有醫難曰何名賊邪豫曰難經論五邪有實邪虛邪正邪微邪賊邪從後來者為虛邪從前來者為實邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪又曰假令心病中暑為正邪中濕得之為賊邪今心先受暑而濕邪勝之水剋火從所不勝斯謂之賊邪此五邪之中最逆也難經又云濕溫之脈陽濡而弱陰小而急濡弱見於陽部濕氣摶暑也小急見於陰部暑氣蒸濕也故經曰暑濕相摶名曰濕溫是謂賊邪也不特此也豫素有停飲之疾每至暑月兩足汗漐漐未嘗干每服此藥二三盞即便愈黃耆建中加當歸湯黃耆蜜炙當歸洗去蘆薄切焙乾稱各一兩半白芍藥三兩桂一兩一分去粗皮不見火甘草一兩炙上粗末每服五錢生薑三片棗一個水一盞半同煎至八分去滓取七分清汁日三服夜二服尺脈尚遲再作一劑昔有鄉人丘生者病傷寒豫為診視發熱頭疼煩渴脈雖浮數而無力尺以下遲而弱豫曰雖屬麻黃證而尺遲弱仲景云尺中遲者榮氣不足血氣微少未可發汗豫於建中湯加當歸黃耆令飲翌日脈尚爾其家煎迫日夜督發汗藥言幾不遜矣豫忍之但只用建中調榮而已至五日尺部方應遂投麻黃湯啜第二服發狂須臾稍定略睡已得汗矣信知此事是難是難仲景雖云不避晨夜即宜便治醫者亦須顧其表裡虛實待其時日若不循次第暫時得安虧損五臟以促壽限何足貴也南史記範云初為梁武帝屬官武帝將有九錫之命有旦夕矣云忽感傷寒之疾恐不得預慶事召徐文伯診視以實懇之曰可便得愈乎文伯曰便瘥甚易政恐二年後不復起矣云曰朝聞道夕死猶可況二年乎文伯以火燒地布桃葉設席置云於上頃刻汗解撲以溫粉翌日果愈云甚喜文伯曰不足喜也後二年果卒夫取汗先期尚促壽限況不顧表裡不待時日便欲速效乎每見病家不耐病未三四日晝夜促汗醫者隨情順意鮮不敗事故豫書此為醫者之戒蜜兌法蜜四兩銅器中文武火煎之稍凝如飴狀攪之勿令焦候可丸即取出捻作梃如指許長二寸當熱時急作令頭鋭納穀道中以手急抱定欲大便時乃去之未利再作有一士人家病者二人皆旬日矣一則身熱發汗大便不通小便如經神昏多睡診其脈長大而虛豫用承氣湯下之而愈一則陽明自汗大便不通小便利津液少口乾燥其脈亦大而虛豫作蜜兌三易之下燥屎得溏利而解其家問曰皆陽明大便不通何治之異豫曰二症雖相似然自汗小便利者不可蕩滌五臟為無津液也然則傷寒大證相似餘證稍有不同要在變通仔細斟酌不可不謹破陰丹治陰中伏陽硫黃舶上者水銀各一兩陳皮去白青皮去白各半兩末上先將硫黃銚子內熔次下水銀用鐵杖子打勻令無星傾入黑茶盞內研細入二味勻研用厚麵糊丸如桐子大每服三十丸如煩躁冷鹽湯下如陰證冷艾湯下頃年鄉人李信道得疾六脈沉不見深按至骨則沉緊有力頭疼身溫煩躁指末皆冷中滿噁心更兩醫矣醫者不識只供調氣藥豫因診視曰此陰中伏陽也仲景法中無此證世人患此者多若用熱藥以助之則為陰邪隔絶不能導引真陽反生客熱用冷藥則所伏真火愈見消鑠須用破散陰氣導達真火之藥使火升水降然後得汗而解豫授此藥二百粒作一服冷鹽湯下不半時煩躁狂熱手足躁擾其家大驚豫曰此俗所謂換陽也須臾稍定略睡已得汗自昏達旦方止身涼而病除小柴胡加地黃湯治婦人室女傷寒發熱或發寒熱經水適來或適斷晝則明瞭夜則譫語如見鬼狀亦治産後惡露方來忽爾斷絶柴胡一兩一分去苗洗淨人參去蘆半夏湯洗七次黃芩去皮甘草炙生乾地黃各半兩上粗末每服五錢水二盞生薑五片棗二個同煎至八分去滓溫服辛亥中寓居毗陵學官王仲禮其妹病傷寒發寒熱遇夜則如有鬼物所憑六七日忽昏塞涎響如引鋸牙關緊急瞑目不知人疾勢極危召豫視豫曰得病之初曾值月經來否其家云月經方來病作而經遂止得一二日發寒熱晝雖靜夜則有鬼祟從昨日來涎生不省人事豫曰此熱入血室證也仲景云婦人中風發熱惡寒經水適來晝則明瞭暮則譫語如見鬼狀發作有時此名熱入血室醫者不曉以剛劑與之遂致胸膈不利涎潮上脘喘急息高昏冒不知人當先化其涎後除其熱豫急以一呷散投之兩時頃涎下得睡省人事次授以小柴胡加地黃湯三服而熱除不汗而自解矣一呷散附卷末又記一婦人患熱入血室證醫者不識用補血調氣藥涵養數日遂成血結胸或勸用前藥豫曰小柴胡用已遲不可行也無已則有一焉刺期門穴斯可矣豫不能針請善針者治之如言而愈或問曰熱入血室何為而成結胸也豫曰邪氣傳入經絡與正氣相搏上下流行或遇經水適來適斷邪氣乘虛而入血室血為邪迫上入肝經肝受邪則譫語而見鬼復入膻中則血結於胸也何以言之婦人平居水當養於木血當養於肝也方未受孕則下行之以為月水既妊娠則中蓄之以養胎及已産則上壅之以為乳皆血也今邪逐血並歸肝經聚於膻中結於乳下故手觸之則痛非湯劑可及故當刺期門也活人書海蛤散治血結胸期門二穴直兩乳第二肋間是穴肝經脾經陰維之會婦人傷寒過經不解當針期門使經不傳可針四分又治胸中煩熱奔豚上下霍亂泄利腹堅硬喘不得臥脅下積氣産後余疾飲食不下胸脅支滿心中切痛可灸五壯海蛤散婦人傷寒血結胸膈揉而痛不可撫近海蛤滑石甘草炙各一兩芒硝半兩上為末每服二錢雞子清調下小腸通利則胸膈血散膻中血聚則小腸壅小腸壅膻中血不流行宜此方若小便血數行更宜桂枝紅花湯發其汗則愈活人書云此方疑非仲景方然其言頗有理姑存之桂枝紅花湯只桂枝湯中加紅花一捻真武湯治太陽病汗過不解頭眩筋惕肉瞤茯苓去皮芍藥各三分附子一枚炮去皮臍用四之一白朮半兩上粗末抄五錢生薑五片水一盞半煎八分去滓溫服若小便利者去茯苓下利者去芍藥加乾薑二分嘔者去附子加生薑二兩咳者加五味子六錢一字細辛一分乾薑一分日三服鄉里有姓京者以鬻繩為業子年三十初得病身微汗脈弱惡風醫以麻黃藥與之汗遂不止發熱心多驚悸夜不得眠譫語不識人筋惕肉瞤振振動搖醫者又進驚風藥豫曰此強汗之過也仲景云脈微弱汗出惡風者不可服大青龍湯服之則筋惕肉瞤此為逆也惟真武湯可救進此三服佐以清心丸竹葉湯送下數日愈清心丸退餘熱生津液止煩渴地骨皮去心黃芩去皮麥門冬用水浥去心青黛車前子烏梅肉蒲黃炒香附子炒去毛各等分上為末煉蜜丸如彈子非時含化一丸或熟水化服竹葉石膏湯治大病後虛羸少氣嘔逆欲吐石膏四兩杵碎半夏七錢半湯洗七次人參半兩去蘆麥門冬二兩用水浥去心淡竹葉半把甘草半兩炙嘔者加生薑一兩半上銼如麻豆大每服五錢水一盞半粳米一百餘粒煮至八分米熟湯成去滓溫服白虎加人參湯石膏四兩杵碎綿裹知母一兩半甘草二兩半炙粳米一合半人參半兩去蘆上銼如麻豆大每服五錢水一盞半煮至八分米熟為度去滓溫服局方云食後服此藥立夏後立秋前可服春時及立秋後並亡血虛家並不可服有人病初嘔吐俄為醫者下之已七八日而內外發熱豫診之曰當用白虎加人參湯或曰既吐復下且重虛矣白虎可用乎豫曰仲景云若吐下後七八日不解熱結在裡表裡俱熱者白虎加人參湯此正相當也蓋始吐者熱在胃脘而脈實今虛而大三投湯而愈仲景既稱傷寒若吐下後七八日不解熱結在裡表裡俱熱者白虎加人參湯主之又云傷寒脈浮發熱無汗其表不解不可與白虎湯又云傷寒脈浮滑此以表有熱里有寒白虎湯主之國朝林億校正謂仲景於此表裡自瘥矣豫謂不然大抵白虎能治傷寒中暍表裡發熱故前後二證或云表裡俱熱或云表熱裡寒皆可服之中一證脈浮無汗其表不解全是麻黃與葛根證安可行白虎也林億見所稱表裡不同便謂之差互是亦不思之過也肉豆蔻湯治傷寒汗後吃噫肉豆蔻一個石蓮肉去心炒茴香各一分炒丁香半分不見火枇杷葉五片拭去毛炙人參半兩去蘆上銼細用水四盞生薑十片煎二盞去滓空心溫服分二服良薑湯橘皮去白良薑切炒桂枝去皮不見火當歸洗去蘆薄切焙乾稱各一分麻黃去節百沸湯泡去黃汁焙乾半兩檳榔三個別末甘草一分炙杏仁二十枚去皮尖上粗末用水四盞薑十片棗三個同煎至二盞去滓下檳榔末再煎三沸通口服一盞未已再作一劑龐老云傷寒吃噫不止是陰陽氣升降欲作汗升之不上降之不下故胃氣上逆為吃噫無休止宜此方吃噫又方枳殼半兩去穰麩炒黃木香一錢上細末每服一錢白湯調下未知再與滑石丸治傷寒衄血滑石末不拘多少飯丸如桐子大每服十丸微嚼破新水咽下立止只用藥末一大錢飯少許同嚼下亦得老幼皆可服陽晦叔云鼻衄者當汗不汗所致其血青黑時不以多少勿得止宜服溫和藥以調其榮衛才見血鮮急以此藥止之桂枝湯方在前有人病發熱惡寒自汗脈浮而微弱三服此湯而愈此方在仲景一百十三方內獨冠其首今人全不用苦哉仲景云太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱宜桂枝湯此脈與證仲景説得甚分明只後人看不透所以不敢用仲景云假令寸口脈微名曰陽不足陰氣上入陽中則灑淅惡寒也尺脈弱名曰陰不足陽氣下陷入陰中則發熱也此謂元受病者然也又曰陽微則惡寒陰弱則發熱醫發其汗使陽氣微又大下之令陰氣弱此謂醫所病而然也大抵陰不足陽往從之故內陷而發熱陽不足陰往乘之故陰上入陽中則惡寒舉此二端明白如此何憚而不用桂枝哉茵陳蒿湯治胃中有熱有濕有宿谷相摶發黃茵陳蒿嫩者一兩半大黃三分以濕紙裹甑上蒸梔子小者十枚去皮上粗末每服一錢水一盞半煎至八分去滓調五苓散二錢服以知為度五苓散治傷寒溫熱病表裡未解頭痛發熱口燥咽乾煩渴飲水或水入即吐或小便不利及汗出表解煩渴不止者宜服又治霍亂吐瀉燥渴引飲五苓散豬苓去黑皮一兩半澤瀉二兩半白朮一兩半白茯苓去皮一兩半桂一兩去粗皮不見火上件各事持搗為散拌勻每服三錢白湯調下不計時候服訖多飲熱湯汗出即愈又治瘀熱在裡身發黃疸濃煎茵陳蒿湯下食前服疸病發渴及中暑引飲亦可用水調服局方云小兒加白朮末少許服之若發虛加黃耆人參末服之瓜蒂散治頭中寒濕發黃疸瓜蒂二七個赤小豆秫米各二七粒上細末水法丸如大豆大一枚許納鼻中縮鼻令入當出黃水切不可吹入庚戌年避地維揚界有一家病傷寒七八日身體洞黃鼻目皆痛兩髀及項頸腰脊強急大便澀小便如金豫曰脈緊且數脾元受濕暑熱蘊蓄於太陽之經宿谷相摶鬱蒸而不得散故使頭面有汗至頸以下無之若鼻中氣冷寸口近掌無脈則不療急用茵陳湯調五苓散與之數服瘥又記一家病身體痛面黃喘滿頭痛自能飲食大小便如經豫診之脈大而虛鼻塞且煩豫曰非濕熱宿谷相摶此乃頭中寒濕茵陳五苓不可行也仲景云濕家病身疼痛發熱面黃而喘頭痛鼻塞而煩其脈大能自飲食中和無病病在頭中寒濕故鼻塞納藥鼻中則愈仲景無藥方此方見外臺刪繁證云治天行熱毒通貫臟腑沉鼓骨髓之間或為黃疸宜瓜蒂散即此方也又記一舟梢病傷寒發黃鼻內痠痛身與目如金小便赤而數大便如經或者欲用茵陳五苓豫曰非其治也小便利大便如常則知病不在臟腑今眼時疼鼻頞痛是病在清道中清道者華蓋肺之經也若下大黃則必腹脹為逆亦用瓜蒂散先含水次搐之鼻中黃水盡乃愈一呷散即九籥衛生方驅風妙應散療危惡諸風角弓反張失音不語牙關緊急涎潮發搐目瞪直視精神昏塞呷迄甲切吸呷也大天南星不拘多少上選臘辰日以河水露星宿下浸四十九日浸畢取出用米泔水洗去滑焙乾為細末每服大人用一錢小兒一字並生薑薄荷湯調服如牙關緊急口緊不開即斡開口先以此藥末揩牙須臾口開即溫溫灌之
