body:
  text: 卷第十婦人諸疾四物湯治婦人榮衛氣虛挾風冷胸脅膨脹腹中㽲痛經水愆期或多或少崩傷漏下腰腿痛重面色青黃嗜臥無力安胎止痛補虛益血當歸去蘆洗薄切焙乾稱芎藭熟乾地黃酒灑九蒸九曝焙稱白芍藥各等分上粗末每服四錢水一盞煎至八分去滓溫服不拘時候滑胎枳殼散甘草一兩炙商州枳殼二兩去穰麩炒黃上細末每服二錢百沸湯點服空心食前日三服凡懷孕六七月以上即服令兒易生初生胎小微黑百日以後肉漸變白此雖孫真人滑胎易産方然抑陽降氣為衆方之冠內補丸治妊娠衝任脈虛補血安胎熟乾地黃酒灑九蒸九曝焙稱二兩當歸去蘆洗切焙乾微炒一兩上細末煉蜜和丸如桐子大每服三四十丸溫酒下以上三方諸集皆載之在人用之如何爾大率婦人妊娠惟在抑陽助陰素問云陰搏陽別謂之有子蓋關前為陽關後為陰尺中之脈按之搏手而不絶者妊子也婦人平居陽氣微盛無害及其妊子則方閉經隧以養胎若陽盛搏之則經脈妄行胎乃不固素問所謂陰虛陽搏謂之崩也抑陽助陰之方甚多然胎前藥惟惡群隊若陰陽交雜別生他病唯是枳殼散所以抑陽四物湯所以助陰故爾但枳殼散差寒若單服之恐有胎寒腹痛之疾當以內補丸佐之則陽不至強陰不至弱陰陽調勻有益胎嗣此前人未嘗論及也木香丸治婦人有孕傷飲食木香二錢匕京三稜京三稜能落胎不可用用前胡五錢人參去蘆白茯苓去皮各三錢匕上細末麵糊丸如緑豆大每服三十丸熟水下白朮散治妊娠氣不和調飲食少白朮炒乾紫蘇各一兩白芷微炒三分人參三分去蘆川芎洗訶子皮青皮去白各半兩甘草一分炙上細末每服二錢水一盞姜三片煎七分不拘時候溫服經云飲食自倍腸胃乃傷又云陰之所生過在五味陰之五宮傷在五味若妊子飲食不節生冷毒物恣性食啖必致脾胃之疾故妊娠傷食難得妥藥惟此二方最穩捷紫蘇飲治妊娠胎氣不和懷胎近上脹滿疼痛謂之子懸兼治臨産驚恐氣結連日不産大腹皮人參去蘆川芎洗陳橘皮去白白芍藥各半兩當歸洗去蘆薄切三錢紫蘇莖葉一兩甘草一錢炙上各細銼分作三服每服用水一盞半生薑四片蔥白七寸煎至七分去渣空心服曾有婦人纍日産不下服遍催生藥不驗豫曰此必坐草太早心懷恐懼氣結而然非不順也素問云恐則氣下蓋恐則精神怯怯則上焦閉閉則氣還還則下焦脹氣乃不行矣得此藥一服便産及婦人六七月子懸者豫用此數數有驗不十服胎便近下下死胎方桂末二錢麝香當門子一個同研暖酒服須臾如手推下此不用水銀等此藥不損血氣趙和叔傳紫石英丸治婦人病多是月經乍多乍少或前或後時發疼痛醫者一例呼為經病不曾說得是陰勝陽是陽勝陰所以服藥少得有效蓋陰氣乘陽則胞寒氣冷血不運行經所謂天寒地凍水凝成冰故令乍少而在月後若陽氣乘陰則血流散溢經所謂天暑地熱經水沸溢故令乍多而在月前當和其陰陽調其血氣使不相乘以平為福紫石英禹餘糧燒醋淬人參去蘆龍骨川烏頭炮去皮尖桂心不見火杜仲去皮銼如豆炒令黑桑寄生五味子揀遠志去心澤瀉當歸去蘆洗薄切焙乾稱石斛去根淨洗細銼酒焙蓯蓉酒浸水洗焙乾乾薑炮各一兩川椒去目併合口微炒地上出汗牡蠣鹽泥固濟干火燒通赤去泥用甘草炙各半兩上為末煉蜜丸如桐子大米飲下三十丸至五十丸空心食前通經丸治婦人室女月候不通疼痛或成血瘕桂心不見火青皮去白大黃炮乾薑炮川椒去目併合口微炒地上出汗蓬莪朮川烏炮去皮尖乾漆炒令煙出當歸洗去蘆薄切焙乾稱桃仁去皮尖炒各等分上細末將四分用米醋熬成膏和餘六分末成劑臼中治之丸如桐子大陰乾每服二十丸用淡醋湯送下加至三十丸溫酒亦得空心食前服徽州醫巫張橫頃年緣事在推勘院有王醫者以醫職直宿日夜與之稔熟口傳此方渠甚祕之豫後得此方以治婦人疾不可勝數且欲廣行不敢自祕尋常氣血凝滯疼痛數服便效有一師尼患惡風體倦乍寒乍熱面赤心煩或時自汗是時疫氣大行醫見其寒熱作傷寒治之以大小柴胡湯雜進數日病劇豫診視曰三部無寒邪脈但厥陰脈弦長而上出魚際宜服抑陰等藥豫制此地黃丸生乾地黃二兩柴胡去苗淨洗秦艽淨洗去蘆黃芩各半兩赤芍藥一兩上細末煉蜜丸如桐子大每服三十丸烏梅湯吞下不拘時候日三服昔宋褚澄療尼師寡婦別制方蓋有謂也此二種鰥居獨陰無陽欲心動而多不遂是以陰陽交爭乍寒乍熱全類溫瘧久則為勞嘗讀史記倉公傳載濟北王侍人韓女病腰背痛寒熱衆醫皆以為寒熱也倉公曰病得之欲男子不可得也何以知其欲男子而不可得診其脈肝脈弦出寸部是以知之蓋男子以精為主婦人以血為主男子精盛則思室婦人血盛則懷胎夫肝攝血者也厥陰弦出寸部又上魚際則陰血盛可知故知褚澄之言信有謂矣地黃丸治婦人月經不調每行數日不止兼有白帶漸漸瘦悴飲食少味纍年無子熟乾地黃一兩一分山茱萸連核用白蕪荑白芍藥銼微炒代赭石醋淬煅五六次各一兩乾薑炮厚朴去粗皮生薑汁炙白殭蠶各三分去絲嘴炒上細末煉蜜丸如桐子大每服四五十丸空心酒下日三服此龐老方凡婦人有白帶是第一等病令人不産育宜速治之昔扁鵲過邯鄲聞貴婦人多有此病所以專為帶下醫也琥珀散治婦人月經壅滯每發心腹臍㽲痛不可忍及治産後惡露不快血上搶心迷悶不省氣絶欲死京三稜制蓬莪朮銼赤芍藥劉寄奴去梗牡丹皮去心官桂不見火熟乾地黃菊花去萼真蒲黃當歸干稱各一兩細銼上前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為末每服二錢溫酒調下空心食前服一方不用菊花蒲黃用烏藥延胡索亦佳此豫家之祕方也若是尋常血氣痛只一服産後血衝心二服便下常服尤佳豫前後救人急切不少此藥易合宜多合以救人桃仁煎治婦人血瘕血積經候不通桃仁去皮尖麩炒黃大黃濕紙裹甑上蒸川朴硝各一兩虻蟲半兩炒黑上四味末之以醇醋二升半銀石器中漫火煎取一升五合先下大黃桃仁虻蟲三味不住手攪欲丸下川朴硝更不住手攪良久出之丸如桐子大前一日不用吃晚食五更初用溫酒吞下五丸日午取下如赤豆汁雞肝蝦蟆衣未下再作血鮮紅即止續以調氣血藥補之此出千金方頃年在毗陵有一貴人妻患小便不通臍腹脹不可忍衆醫皆作淋治如八正散之類數種治皆不退痛愈甚豫診之曰此血瘕也非瞑眩藥不可去豫用此藥五更初服至日午痛大作不可忍遂臥少頃下血塊如拳者數枚小便如黑汁者一二升痛止得愈此藥治病的切然猛烈太峻氣血虛弱者更宜斟酌與之佛手散治婦人妊孕五七月因事築磕著胎或子死腹中惡露下疼痛不止口噤欲絶用此藥探之若不損則痛止子母俱安若胎損立便逐下此藥催生神妙當歸六兩洗去蘆薄切焙乾稱川芎四兩洗上粗末每服二錢水一小盞煎令泣泣欲干投酒一大盞止一沸去滓溫服口噤灌之如人行五七里再進不過二三服便生和劑局方此藥治傷胎去血多崩中去血多金瘡去血多拔齒去血多昏暈欲倒者用水煎服治崩中下血方黃芩為細末每服一錢燒稱錘淬酒調下崩中多是用止血藥補血藥此治陽乘陰前所謂天暑地熱經水沸溢者治下血不止或成五色崩漏方香附子舂去皮毛中斷之略炒為末每服二錢用清米飲調下此方徐朝奉傳其內人有是疾服遍藥不效後獲此方遂愈須久服為佳亦治産後腹痛大是婦人仙藥常服資血調氣愈風散治産後中風口噤牙關緊急手足瘛瘲荊芥穗輕焙過一兩細末每服二錢溫酒調下經驗産寶皆有此方陳選方中用舉卿古拜二味蓋切腳隱語以祕之也此藥委有奇效神聖之功大抵産室但無風為佳不可衣被帳褥太暖太暖即汗出汗出則腠理開易於中風便致昏冒曾記有一婦人産後遮護太密閣內更生火睡久及醒則昏昏如醉不省人事其家驚惶醫用此藥佐以交加散囑云服之必睡睡中必以左手搔頭覺必醒矣果如其言交加散治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕産後中風生地黃五兩研取汁生薑五兩研取汁上交互用汁浸一夕各炒黃漬汁盡為度末之尋常腹痛酒調下三錢産後尤不可缺治婦人諸般淋苦杖根俗呼為杜牛膝多取淨洗碎之以一合用水五盞煎一盞去滓用麝香乳香少許研調下鄞縣武尉耿夢得其內人患砂石淋者十三年矣每漩痛楚不可忍溺器中小便下砂石剝剝有聲百方不效偶得此方啜之一夕而愈目所見也半夏散治婦人血運血迷敗血衝心昏悶不省人事半夏末如豆大許以竹管吹入鼻中立醒蒲黃散治産後出血太多虛煩發渴真蒲黃末二錢飲下渴躁甚新汲水下治妊娠時氣身大熱令子不落護胎方伏龍肝為末水調塗臍下二寸干則易瘥即止又取井中泥塗心下干則易又方浮萍干川朴硝蛤粉大黃碎微炒藍根各一兩上為末水調封臍上安胎解煩熱極妙芎羌湯婦人患頭風者十居其半每發必掉眩如在車上蓋因血虛肝有風邪襲之爾素問云徇蒙招搖目眩耳聾上虛下實過在足少陽厥陰甚則歸肝蓋謂此也豫嘗處此方以授人比他藥捷而效速川芎一兩洗當歸三分洗去蘆薄切焙乾稱羌活洗去蘆旋覆花細辛華陰者去葉蔓荊子揀石膏生藁本去苗淨洗荊芥穗半夏曲炒防風去叉股熟地黃酒灑九蒸九曝焙乾甘草各半兩炙上為末每服二錢水一大盞姜五片同煎至七分去滓溫服不拘時候婦人産後有三種疾鬱冒則多汗多汗則大便祕故難於用藥唯麻子蘇子粥最佳且穩紫蘇子大麻子二味各半合淨洗研極細用水再研取汁一盞分二次煮粥啜之此粥不唯産後可服大抵老人諸虛人風祕皆得力嘗有一貴人母年八十四忽爾腹滿頭疼噁心不下食召醫者數人議皆供補脾進食治風清利頭目藥數日疾愈甚全不入食其家憂懼懇豫辨之豫診之曰藥皆誤矣此疾只是老人風祕臟腑壅滯聚於膈中則腹脹噁心不喜食又上至於巔則頭痛神不清也若得臟腑流暢諸疾悉去矣豫令作此粥兩啜而氣泄先下結屎如胡椒者十餘後漸得通利不用藥而自愈當歸散治婦人天癸已過期經脈不勻或三四月不行或一月再至腰腹疼痛素問云七損八益謂女子七七數盡而經脈不依時者血有餘也不可止之但令得依時不腰痛為善當歸洗去蘆薄切焙乾稱川芎洗白芍藥黃芩去皮各銼炒各一兩白朮半兩山茱萸一兩半連核用上細末每服二錢酒調下空心食前日三服如冷去黃芩加桂一兩大棗湯治婦人臟燥甘草三兩炙小麥一升大棗十個上㕮咀以水六升煮三升去滓溫分三服亦補脾氣鄉里有一婦人數缺伸無故悲泣不止或謂之有祟祈禳請禱備至終不應豫忽憶金匱有一症云婦人臟燥悲傷欲哭象如神靈所作數缺伸者麥甘大棗湯豫急令治此藥盡劑而愈古人識病制方種種妙絶如此試而後知鹿屑湯治妊娠熱病胎死腹中鹿角屑一兩水一碗蔥白五莖豆豉半合同煎至六分去滓溫分二服治婦人生産數日不下及胞衣死胎不下者方用萆麻子七粒去殼研如泥塗足心才下便急洗去此崔元亮海上方人但未知耳政和中一鄉人內子産二日不下豫令漫試之一塗俄頃便下自後常用極驗小兒病凡候小兒脈當以大指按三部一息六七至為平和十至為發熱五至為內寒脈緊為風癇沉緩為傷食促急為虛驚弦急為氣不和沉細為冷浮為風大小不勻為惡候為鬼祟浮大數為風為熱伏結為物聚單細為疳勞凡腹痛多喘嘔而脈洪者為有蟲浮而遲潮熱者胃寒也溫之則愈豫嘗作歌以記之歌曰小兒脈緊風癇候沉緩食傷多吐嘔弦急因知氣不和急促虛驚神不守冷則沉細風則浮牢實大便應祕久腹痛之候緊而弦脈亂不治安可救變蒸之時脈必變不治自然無過繆單細疳勞洪有蟲大小不勻為惡候脈浮而遲有潮熱此必胃寒來內寇瀉利浮大不可醫仔細斟量宜審究凡嬰兒未可脈辨者俗醫多看虎口中紋顏色與四肢冷熱驗之亦有可取豫亦以二歌記之虎口色歌曰紫風紅傷寒青驚白色疳黑時因中惡黃即困脾端冷熱症歌曰鼻冷定知是瘡疹耳冷應知風熱症通身皆熱是傷寒上熱下冷傷食病若能以色脈參佐驗之所得亦過半矣睡驚丸治小兒一切驚疳食積風癇之證使君子五十個燒存性香墨棗大一塊金銀箔各五片膩粉二錢上先研使君子墨二味細次入金銀箔於乳鉢內同研次入膩粉並麝香少許研令極細勻稀糊丸如桐子大陰乾每服一丸薄荷湯磨下一歲以下半丸一名青金丹鄉里有一士人家貨此藥日得數千錢已百餘年矣麥門冬散治小兒嘔吐脈數有熱麥門冬用水浥去心焙半夏曲炙人生去蘆茯苓去皮各三錢甘草一分炙上細末每服二錢水一盞姜三片煎五分去滓溫日二三服白朮散治小兒嘔吐脈遲細有寒白朮人參去蘆各二錢半夏曲炙三錢茯苓去皮乾薑炮甘草炙各一錢上細末每服二錢水一盞姜三片棗一枚煎至七分去滓溫日二三服調中丸治小兒久傷脾胃腹脹乾薑炮橘紅白朮茯苓去皮木香縮砂仁官桂去粗皮不見火良薑各等分上細末糊丸如麻子大每服二三十丸食後熟水下芎朴丸治小兒疳瘦瀉白水腹膨脹芎藭厚朴去粗皮生薑汁炙各一兩白朮半兩上細末煉蜜丸如小彈子大每服一丸米飲化下三歲以下半丸消積丸治小兒食積口中氣溫面黃白多睡大便黃赤臭縮砂十二個丁香九個不見火烏梅肉三個巴豆一個去皮膜油上細末糊丸如黍米大三歲以上五六丸三歲以下二三丸溫水下無時大凡小兒身溫壯非變蒸之候大便白而酸臭為胃有蓄冷宜丸藥消下後服溫胃藥若身溫壯大便赤而酸臭為胃有蓄熱亦宜丸藥消下後服涼胃藥無不愈捻金散治小兒麻豆瘡欲出渾身壯熱情緒不樂不思飲食服此可以內消仍令瘡無瘢痕紫草茸升麻糯米各半兩甘草一分炙上粗末每服四錢水一盞煎至六分去滓溫服並滓再作一服此療瘡疹奇方扁銀丸治小兒急慢驚風積痼青黛三大錢水銀一皂子大同黑鉛炒結成砂子寒食麵黃明膠炒令焦為末各二錢輕粉炒五錢雄黃水飛粉霜硃砂各一錢水飛巴豆二十一個去皮膜油腦麝少許上都研細勻滴水丸如麻子大捏令扁曝乾瓷盒盛一歲一丸隨意加減煎皂子湯送下不得化破治小兒有陽癇陰癇慢脾風三證皆搐搦上視陽癇者俗所謂急驚也陰癇者俗所謂慢驚也皆可隨證治之惟慢脾風因吐瀉脾胃受風為難治難得藥近世多用生附子及青州白丸子金液丹今用之如醒脾丸皆要藥也青州白丸子天南星三兩半夏七兩白附子二兩川烏半兩生去皮臍上四味生搗為末生絹袋盛井花水擺如有未出者更以手揉令出盡放瓷盆中以清水浸日曬夜露逐日換水攪春五日夏三日秋七日冬十日去水曬乾再研勻煎糯米粉作清粥丸如緑豆大癱瘓風溫酒下三十丸日三服服至三日後入浴當有汗便能舒展服經三五日呵缺是應常服十粒永無風痰膈壅之患小兒薄荷湯化下三二丸金液丹已見第九卷醒脾丸治小兒慢脾風因吐利後虛困昏睡欲生風癇厚朴去粗皮薑汁炙白朮天麻去蘆舶上硫黃各半兩全蠍去毒防風去叉股人參去蘆官桂去粗皮不見火各一分上為末酒浸蒸餅和丸如雞頭大每服一丸捶碎溫米飲下又方全蠍二個青薄荷葉裹煨白朮指面大二塊麻黃長五寸十五條去節上細末二歲以下一字三歲以上半錢薄荷湯下量大小加減服人參散治脾風多困人參去蘆冬瓜仁各半兩天南星一兩切片用漿水薑汁煮略存性上細末每服一錢水半盞煎二三分溫服蠍梢丸治小兒胎虛氣弱吐利生風昏困嗜臥或時潮搐全蠍微炒白附子煨制各半兩通明硫黃一兩半夏一兩切片薑汁製焙乾上細末薑汁糊丸如麻子大每服三十粒荊芥湯下更看大小加減服龍齒散治小兒拗哭羌活去蘆龍齒蟬殼去頭足鉤藤有鉤子者茯苓去皮人參去蘆各等分上為末每服一大錢水一大盞煎六分去滓溫服
