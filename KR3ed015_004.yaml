body:
  text: 卷第二心小腸脾胃病遠志丸治因驚語言顛錯不能服溫藥遠志去心洗銼炒令黃色南星白附子炮微黃白茯苓去皮人參去蘆酸棗仁微炒去皮研各半兩金箔五片硃砂水飛半兩入麝香少許同研上為細末煉蜜丸如梧子大硃砂為衣每服三十丸薄荷湯下食後臨臥服茯神散茯神去木熟乾地黃酒灑九蒸九曝焙乾稱白芍藥川芎當歸洗去蘆薄切焙乾白茯苓去皮桔梗炒遠志去心洗銼炒令黃色人參去蘆以上各一兩上為細末每服二錢水一盞燈心棗同煎至七分不拘時候宋明遠教授之母七十四歲因戎馬驚疾如上證服此二方得力寧志膏人參去蘆一兩酸棗仁微炒去皮研一兩辰砂水飛半兩乳香一分以乳鉢坐水盆中研上為細末煉蜜和杵丸如彈子大每服一粒薄荷湯化下豫族弟婦緣兵火失心制此方與之服二十粒愈親識多傳去服之皆驗驚氣丸治驚憂積氣心受風邪發則牙關緊急涎潮昏塞醒則精神若癡附子炮去皮臍南木香白殭蠶去絲嘴炒花蛇酒浸去皮骨炙橘紅天麻去蘆麻黃去根節各半兩乾蠍一兩去毒紫蘇子一兩淘洗天南星洗浸薄切片薑汁浸一夕半兩硃砂水飛一分留少許作衣上為末入研腦麝少許同研極勻煉蜜杵丸如龍眼大每服一粒金銀薄荷湯化下溫酒亦得此豫家祕方也戊申年軍中一人犯法褫衣將受刃得釋神失如癡豫與一粒服訖而寐及覺病已失矣江東提轄張載揚其妻因避寇失心已數年豫授此方不終劑而愈又黃山沃巡檢彥其妻狂厥者逾年更十餘醫而不驗豫授此方去附子加鐵粉亦不終劑而愈鐵粉非但化涎鎮心至如摧抑肝邪特異若多恚怒肝邪太盛鐵粉能制伏之素問言陽厥狂怒治以鐵落飲金制木之意也此亦前人未嘗論及辰砂遠志丸安神鎮心治驚悸消風痰止頭眩石菖蒲去須洗遠志去心洗銼炒令黃色人參去蘆茯神去木川芎山芋鐵粉麥門冬水浥去心天麻半夏曲南星銼骰子大麩炒黃白附子生各一兩細辛去葉辰砂水飛各半兩上為細末生薑五兩取汁入水煮糊丸如緑豆大別以硃砂為衣干之每服三五十粒夜臥生薑湯送下小兒減丸服茯苓丸辰砂水飛石菖蒲去須洗人參去蘆遠志去心洗銼炒令黃色茯神去木白茯苓去木真鐵粉半夏曲南星羊膽制各等分上為細末生薑四兩取汁和水煮糊丸如梧子大別用硃砂為衣干之每服十粒加至三十粒夜臥生薑湯下上二方醫官都君豫常用以療心疾良驗火府丹治心經熱小便澀及治五淋生乾地黃二兩木通削去粗皮銼研細末稱入黃芩去皮各一兩上為細末煉蜜杵丸梧子大每服三十粒木通煎湯下此藥治淋澀臍下滿痛壬戌年一卒病渴日飲斛水不食者三月心中煩悶時已十月豫謂必心經有伏熱與此丹數服五十粒溫水下越二日不覺來謝云當日三服渴止又次日三服飲食如故此本治淋用以治渴信知用藥要在變通也七珍散開胃養氣進食人參去蘆白朮黃耆蜜水塗炙山芋白茯苓去皮粟米微炒甘草各一兩炙上為細末每服二錢水一盞薑棗同煎至七分如大故不思飲食加白扁豆一兩蒸用名八珍散豫制此方溫平不熱每有傷寒瘧疾中暑得瘥之後用此以調脾胃日三四服十日外飲食倍常曲術丸治脾元久虛不進飲食停飲脅痛神麯十兩微炒白朮五兩乾薑炮官桂去粗皮不見火各三兩吳茱萸湯浸七次焙川椒去目併合口微炒地上出汗各二兩上為細末薄糊丸如梧子大每服三五十丸生薑湯下食前稍空腹有飲加半夏曲二兩癸亥中豫作數劑自服飲食倍進白朮湯和氣調中進食白朮厚朴去粗皮生薑汁炙桂心不見火桔梗炒乾薑炮人參去蘆當歸洗去蘆薄切焙乾茯苓去皮甘草炙以上各等分上為粗末每服四錢水一盞半棗二個同煎至八分去滓不拘時候龐老方二神丸治脾腎虛弱全不進食破故紙四兩炒香肉豆蔻二兩生上為細末用大肥棗四十九個生薑四兩切片同煮棗爛去薑取棗剝去皮核用肉研為膏入藥和杵丸如梧子大每服三十丸鹽湯下有人全不進食服補脾藥皆不驗豫授此方服之欣然能食此病不可全作脾虛蓋因腎氣怯弱真元衰劣自是不能消化飲食譬如鼎釜之中置諸米穀下無火力雖終日米不熟其何能化黃魯直嘗記服菟絲子淨淘酒浸曝乾日抄數匙以酒下十日外飲啖如湯沃雪亦知此理也溫脾散舶上茴香炒香青皮去皮陳艾縮砂仁桔梗炒香白芷不見火厚朴去粗皮生薑汁炙各一兩木香白朮香附子麩炒舂去皮各半兩甘草一兩半炙紅豆良薑麥蘖乾葛各三兩上為細末每服一錢水一盞半棗一個煎至七分食前溫服肺腎經病棗膏丸肺之積名曰息賁在右脅下大如杯令人灑淅寒熱喘嗽發癰疽葶藶去蘆隔紙炒香陳橘皮去白桔梗炒各等分上先以下二味為末入葶藶研勻煮肥棗肉和丸如梧子大每服五七丸飲下豫嘗患停飲久積肺經食已必嚏漸喘覺肺系急服此良驗五味子丸平肺氣補虛消飲五味子揀二兩桂心不見火大杏仁北來者去皮尖微炒青皮去白細辛去葉人參去蘆檳榔煨各一兩乾薑炮附子炮去皮臍各半兩上為細末煉蜜丸如梧子大每服三四十丸酒或湯下空心食前日三服葶藶丸定喘急肺積苦葶藶一兩一分隔紙炒香當歸洗去蘆薄切焙乾肉桂去粗皮不見火白蒺藜去角炒乾薑炮川烏頭炮去皮尖吳茱萸湯浸焙七次大杏仁去皮尖微炒鱉甲淡醋煮去裙膜淨洗酸醋炙黃茯苓去皮人參去蘆各半兩檳榔一兩上為細末煮棗肉和杵丸如梧子大每服二三十丸薑棗湯下日三四服不拘時候紫金丹治多年肺氣喘急咳嗽晨夕不得眠信砒一錢半研飛如粉豆豉好者一兩半水略潤少時以紙浥干研成膏上用膏子和砒同杵極勻丸如麻子大每服十五丸小兒量大小與之並用臘茶清極冷吞下臨臥以知為度有一親表婦人患十年遍求醫者皆不效忽有一道人貨此藥謾贈一服是夜減半數服頓愈遂多金丐得此方豫屢用以救人恃為神異細辛湯治肺虛實不調鼻塞多涕咽中有涎而喘項強筋急或痛細辛去葉半夏曲茯苓去皮桔梗炒各四錢桂枝去皮不見火三錢甘草二錢炙上為粗末每服四錢水二盞生薑四片蜜半匙同煎至七分溫服日三服升麻湯治肺癰吐膿血作臭氣胸乳皆痛川升麻桔梗炒薏苡仁地榆牡丹皮芍藥子芩刮去皮各半兩甘草三分炙上銼粗末每服一兩水一升半煎至五合去滓日二三服五靈丸治肺喘久而成息賁五靈脂揀如鼠屎者二兩半木香半兩馬兜鈴去殼炒一分葶藶苦者隔紙炒香一分上為細末棗肉和丸如梧子大每服二十丸生薑湯下日三服脾惡濕腎惡燥如硫黃附子鍾乳煉丹之類皆剛劑用之人以助陽補接真氣則可若云補腎則正腎所惡者古人制方益腎皆滋潤之藥故仲景八味丸本謂之腎氣丸以地黃為主又如腎瀝湯之類皆正補腎經也近世盛行香茸丸可補腎經亦有數方具於後腎瀝湯具下版道人深師增損腎瀝湯治風虛勞損挾毒腳弱疼痹或不隨下焦虛冷胸中微有客熱心虛驚悸不得眠食少失氣味日夜數過心煩迫不得臥小便不利又時復下病似此者服無不瘥隨宜增損之方黃耆蜜炙肉蓯蓉洗酒浸焙乾稱赤石脂地骨白皮去心磁石久煅醋淬八九次枳實去穰麩炒銼防風去叉股龍骨黏舌者芍藥麥門冬水浥去心焙稱人參去蘆熟乾地黃九蒸九曝乾稱茯神去木當歸水洗酒浸一宿切焙甘草炙遠志去心洗銼炒黃色各一兩桂心去皮不見火芎藭各二兩生薑四兩五味子揀三兩半夏一升湯洗七次去滑白羊腎一具大棗三十個去核胡洽方無黃耆以下八味並半夏有黃芩為十五味上二十三味㕮咀以水二斛煮羊腎取汁一斛二升納諸藥煮取四升分為五服不利下者除龍骨赤石脂小便澀以赤茯苓代茯神加白朮三兩多熱加黃芩一兩遺溺加桑螵蛸二十枚蔡太師所服香茸丸鹿茸酥炙黃燎去毛熟乾地黃酒灑九蒸九曝焙乾稱各二兩蓯蓉酒浸水洗焙乾破故紙炒香附子炮去皮臍當歸洗去蘆薄切焙乾稱各一兩麝香一錢沉香半兩上為末入麝研勻煉蜜杵丸如梧子大每服三五十丸空心用鹽湯下又方鹿茸二兩酥炙黃燎去毛沉香白芍藥人參去蘆熟乾地黃酒灑九蒸九曝焙乾稱蓯蓉酒浸水洗焙乾牛膝酒浸水洗焙乾澤瀉大附子炮去皮臍當歸洗去蘆薄切焙乾稱各一兩生乾地黃一兩麝香一錢上為細末酒糊丸如梧子大每服五十丸鹽酒鹽湯下又方熟乾地黃酒灑九蒸九曝焙乾稱五兩菟絲子四兩酒浸曝乾用紙條子同碾別末鹿茸三兩酥炙黃燎去毛附子二兩炮去皮臍沉香一兩上為細末入麝香半錢煉蜜杵丸如梧子大每服三十丸至五十丸鹽酒或鹽湯下椒附散治腎氣上攻項背不能轉側大附子一枚六錢以上者炮去皮臍末之上每末二大錢好川椒二十粒用白麵填滿水一盞半生薑七片同煎至七分去椒入鹽通口空心服一親患項筋痛連及背胛不可轉服諸風藥皆不效豫嘗憶千金髓有腎氣攻背項強一證豫處此方與之兩服頓瘥自爾與人皆有驗蓋腎氣自腰夾脊上至曹溪穴然後入泥丸宮曹溪一穴非精於般運者不能透今逆行至此不得通用椒以引歸經則安矣蕭氣上達椒下達詩言椒聊且貽我握椒皆是此意也曹溪穴即風府穴是也在項髮際上一寸大筋內宛宛中治頭痛頸項急不得回顧針入三分禁不可灸不幸使人失音道家般運有夾脊雙關圖令精氣逆流朝會於泥丸宮泥丸即頂心是也名百會穴是第一麋茸丸治腎經虛腰不能轉側麋茸一兩酥炙黃燎去毛無即以鹿茸代舶上茴香半兩炒香菟絲子酒浸曝乾用紙條子同碾取末一兩上為末以羊腎二對法酒煮爛去膜研如泥和丸如梧子大陰乾如腎膏少入酒糊佐之每服三五十丸溫酒鹽湯下戊戌年八月淮南大水城下浸灌者連月豫忽臟腑不調腹中如水吼數日調治得愈自此腰痛不可屈折雖頰面亦相妨服遍藥不效如是凡三月豫後思之此必水氣陰盛腎經感此而得乃灸腎腧三七壯服此藥瘥腎腧二穴在第十四椎下兩旁相去各一寸五分與臍平治虛勞羸瘦耳聾腎虛水臟久冷心腹膨脹兩脅滿引少腹急痛目視䀮䀮少氣溺血小便濁出精陰中疼五勞七傷虛憊腳膝拘急足寒如冰頭重身熱振栗腰中四肢淫濼洞泄食不化身腫如水灸以年為壯針灸經云針入三分留七呼灸三壯地黃丸治腎虛或時腳腫兼治脾元熟地黃酒灑九蒸九曝焙乾稱二兩半肉蓯蓉酒浸水洗焙乾白茯苓去皮澤瀉各三兩桂枝不見火附子炮去皮臍各半兩五味子三兩揀黃耆獨莖者蜜水塗炙一兩上為細末煉蜜杵丸如梧子大每服四十丸至五十丸空心酒下食前再服青鹽丸治腎虛及足膝無力茴香三兩炒香菟絲子四兩乾山藥二兩青鹽一兩上將菟絲子洗淘無灰酒浸日中煎七日冬天近火煨之曝乾別末將余藥末和勻酒糊丸如梧子大每服三五十丸鹽酒鹽湯下豫頃常服數年壯力進食有一婦人足嚲曳因服此藥久之履地如故補益虛勞方五味子丸治肝腎俱虛收斂精氣補真戢陽充悅肌膚進美飲食五味子揀川巴戟酒浸去心肉蓯蓉酒浸水洗焙乾人參去蘆菟絲子酒浸曝乾用紙條子同碾為末熟地黃酒灑九蒸九曝焙乾稱覆盆子白朮益智仁炒土茴香炒香骨碎補洗去毛白龍骨牡蠣鹽泥固濟干火燒通赤去泥用以上各等分上為細末煉蜜杵丸如梧子大焙乾每服三十丸空心食前米飲下日二三服人參丸此藥補精氣止汗平補五臟虛羸六腑怯弱充肌膚進飲食人參去蘆山芋白朮白茯苓去皮石斛去根淨洗細銼酒炒黃耆蜜水塗炙取頭末五味子揀各一兩上為細末煉蜜丸如梧子大每服三十丸空心食前飲下久服不熱尤宜少年雙和散補血益氣治虛勞少力黃耆蜜塗炙熟地黃酒灑九蒸九曝焙乾稱當歸洗去蘆薄切焙乾川芎各一兩白芍藥二兩半官桂去粗皮不見火甘草炙各三分上為粗末每服四大錢水一盞半生薑三片肥棗一個煎至八分去滓服豫制此方只是建中四物二方而已每傷寒瘧疾中暑大疾之後虛勞氣乏者以此調治皆驗不熱不冷溫而有補黑錫丸此丹陽慈濟真方黑鉛硫黃各三兩謂如硫黃與黑鉛各用三兩即以黑鉛約八兩銚內熔化去滓苴淨盡傾淨地上再於銚內熔以皮紙五重撮四角如箱模樣傾黑鉛在內揉取細者於絹上羅過大抵即損絹須連紙放地上令稍溫紙焦易之下者居上將粗鉛再熔再揉再羅取細者盡為度稱重三兩即以好硫黃三兩研細拌鉛砂令勻於銚內用鐵匙不住攪須文武火不緊不漫俟相乳入傾在淨磚上舶上茴香炒香附子炮去皮臍葫蘆巴微炒破故紙炒香川楝肉去核微炒肉豆蔻各一兩巴戟去心木香沉香各半兩上將砂子研細余藥末研勻入碾自朝至暮以黑光色為度酒糊丸如梧子大陰乾布袋內揬令光瑩如丈夫元臟虛冷真陽不固三焦不和上熱下冷夜夢交合覺來盜汗面無精光肌體燥澀耳內虛鳴腰背疼痛心氣虛乏精神不寧飲食無味日漸瘦悴膀胱久冷夜多小便婦人月事愆期血海久冷惡露不止赤白帶下及陰毒傷寒面青舌卷陰縮難言四肢厥冷不省人事急用棗湯吞一二百丸即便回陽命無不活但是一切冷疾鹽酒鹽湯空心吞下三四十丸婦人艾醋湯下此藥大能調治榮衛升降陰陽安和五臟灑陳六腑補損益虛回陽返陰功驗神聖石斛散治虛勞羸瘦乏力可食倦怠多驚畏石斛四錢去根淨洗細銼酒炒牛膝酒浸水洗焙乾柏子仁去皮研五味子揀遠志去心苗洗銼炒黃色木香杏仁去皮尖炒令香熟肉蓯蓉酒浸水洗焙乾訶子肉炮青橘皮柴胡去苗淨洗人參去蘆熟地黃酒灑九蒸九曝焙乾稱各三錢茯苓四錢去皮甘草二錢炙乾薑一錢半炮神麯碎炒麥蘖各六錢上為細末每服二錢米飲調下食前日二三服八仙丹治虛損補精髓壯筋骨益心智安魂魄令人悅澤駐顏輕身延年益壽閉固天癸伏火硃砂真磁石赤石脂代赭石石中黃禹餘糧五味併火煅醋碎乳香乳鉢坐水盆中研沒藥各一兩上為細末勻研極細糯米濃飲丸如梧子大或如豆大每服一粒空心鹽湯下有人年幾七旬夢漏羸弱氣惙惙然虛損得此方服之頓爾強壯精氣閉固飲食如舊豫常制自服良驗頭痛頭暈方川芎散治風眩頭暈山茱萸一兩山蕷甘菊花去萼梗人參去蘆茯神去木小川芎各半兩上細末每服二錢酒調下不拘時候日三服不可誤用野菊龐先生方鉤藤散治肝厥頭暈清頭目鉤藤陳皮去白半夏湯浸洗七遍薄切焙乾麥門冬略用水浥去心茯苓去皮茯神去木人參去蘆甘菊花去萼梗防風去叉股各半兩甘草一分炙石膏一兩生上為粗末每服四錢水一盞半生薑七片煎八分去滓溫服玉真丸治腎氣不足氣逆上行頭痛不可忍謂之腎厥其脈舉之則弦按之石堅硫黃二兩石膏硬者不煅研半夏湯浸洗七次各一兩硝石一分研上為細末研勻生薑汁糊丸如梧子大陰乾每服三十丸薑湯或米飲下更灸關元穴百壯良方中硫黃丸亦佳關元穴在臍下三寸小腸之募脾經肝經腎經三陰之會又名下紀治臍下㽱痛小便赤澀不覺遺瀝或小便處痛如散火狀或溺血暴疝痛臍下結血狀如覆杯轉胞不得尿婦人帶下瘕聚因産惡露不止月脈斷絶下脛冷可灸三百壯硫黃丸治頭痛沈存中方硫黃二兩研細硝石一兩上水丸如指頭大空心臘茶嚼下豫中表兄病頭風二十餘年每發頭痛如破數日不食百方不能療醫田滋見之曰老母病此數十年得一藥遂愈就求之得十丸日服一枚十餘日滋復來云頭痛平日食何物即發答云最苦飲酒食魚滋取魚酒令恣食云服此藥十枚豈復有頭痛耶如其言食之竟不發自此遂瘥豫與滋相識數歲臨別以此方見遺陳州懷醫有此藥丸如梧桐子大每服十五丸著臘懵冒者冰冷水服下咽即豁然清爽傷冷即以沸艾湯下素問云頭痛巔疾下虛上實過在足少陰巨陽甚則入腎徇蒙招搖目瞑耳聾下實上虛過在足少陽厥陰甚則入肝下虛者腎虛也故腎厥則頭痛上虛者肝虛也故肝厥則頭暈徇蒙者如以物蒙其首招搖不定目眩耳聾皆暈之狀也故肝厥頭暈腎厥巔痛不同如此治肝厥鉤藤散在前治氣虛頭疼大附子一個剜去心全蠍二個入在內以取附子末同鍾乳一分面少許水和裹炮熟都碾為末以焦黃為度蔥茶調下一錢或半錢又方大川芎二個銼作四片大附子一個和皮生為末上以水和附子末如面劑裹川芎作四處如附子末少入面少許裹畢以針穿數孔子用真腦麝熏有穴處內香再捻合穴子如未覺內有香即再熏一炷細羅灰用銚子內熱灰炮熟末之每服半錢蔥茶調下不拘時候上泗醫楊吉老二方神良又方好川芎半兩為末每服二錢臘茶清調下甚捷曾有婦人産後頭痛一服愈白芷丸治氣虛頭暈白芷不見火石斛去根淨洗細銼酒炒乾薑炮各一兩半細辛去葉五味子揀厚朴薑汁炙茯苓去皮肉桂去粗皮不見火防風去叉股甘草炙陳皮各一兩去白白朮一兩一分上為細末煉蜜丸如梧子大每服三十丸清米飲下不飢不飽服鄉人邵致遠年八十有三有此疾得此方數服即愈渠云楊吉老傳白附子散治風寒客於頭中偏痛無時久之牽引兩目遂致失明白附子一兩炮麻黃不去節川烏炮去皮尖南星各半兩炮全蠍五個去毒乾薑炮硃砂水飛麝香各一分上為細末酒調一字服之去枕少時此方見必用方庚寅年一族人患頭痛不可忍一服即瘥羚羊角散治一切頭旋本因體虛風邪乘於陽經上注於頭面遂入於腦亦因痰水在於胸膈之上犯大寒使陽氣不行痰水結聚上衝於頭目令頭旋羚羊角鎊茯神去木各一兩芎藭防風去叉股半夏湯洗七次白芷不見火甘草炙各半兩枳殼去穰細銼麩炒附子炮去皮臍各三分上為粗末每服四錢水一盞半生薑半分漫火煎至七分去滓不拘時候溫服養正丹治虛風頭旋吐涎不已黑鉛水銀舶上硫黃水飛硃砂各一兩水飛上用建盞一隻火上熔鉛成汁次下水銀用柳枝子打勻取下放少時下二味末打勻令冷取下研為粉用米飲丸或用棗肉丸如梧子大每服三十粒鹽湯下此藥升降陰陽補接真氣非止頭旋而已黑龍丸治一切中風頭疼天南星川烏各半斤黑豆熏三次石膏半斤麻黃去根節干薄荷各四兩藁本去蘆洗白芷不見火各二兩京墨一兩半上為細末煉蜜杵丸如彈子大每服一丸薄荷茶湯嚼下
