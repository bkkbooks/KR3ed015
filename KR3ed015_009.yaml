body:
  text: 卷第五腸風瀉血痔漏臟毒玉屑丸治腸風瀉血久不止槐根白皮去粗皮苦楝根白皮去粗皮各三兩椿根白皮去粗皮四兩三味於九月後二月前取軟者日乾天南星半夏各半兩並生威靈仙一兩去苗洗寒食麵三兩上為細末滴水丸如桐子大干之每服三十丸水八分一盞煎沸下丸子煮令浮以匙抄取溫溫送下不嚼空心食前服頃年有一人下血幾盈盆頓爾疲苶諸藥皆不效豫曰此正腸風令服玉屑丸三服止豫苦此疾三十年蓄下血藥方近五十餘品其間或驗或否或始驗而久不應或初不驗棄之再服有驗者未易立談大抵此疾品類不同對病則易愈如下清血色鮮者腸風也血濁而色黯者臟毒也肛門射如血線者蟲痔也亦有一種下部虛陽氣不升血隨氣而降者仲景云脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半産漏下男子則亡血失精此下部虛而下血者也若得革脈卻宜服溫補藥蟲痔宜熏千金用蝟皮艾者佳豫嘗作頗得力千金熏蟲痔方蝟皮方三指大切薰黃棗大末熟艾雞子大上三味穿地作孔調和取便熏之口中薰黃煙氣出為佳火氣消盡即停停三日將息更熏之凡三度永瘥勿犯風冷羹臛將補忌豬雞等蒜連丸治臟毒鷹爪黃連末用獨頭蒜一顆煨香爛熟研和入臼治丸如梧子大每服三四十丸陳米飲下此藥神妙槐花散治腸風臟毒槐花炒柏葉煉杵焙荊芥穗枳殼去穰細切麩炒黃上修事了方稱等分細末用清米飲調下二錢空心食前服巢氏病源論腸癖為痔久困飽食過度房室勞損血氣流溢滲入大腸沖發於下時便清血腹中刺痛病名脈痔又論脾毒腸風本緣榮衛虛弱風氣進襲因熱乘之便血性流散積熱壅遏血滲腸間故大便下血宜椿皮丸椿皮丸臭椿白皮去粗皮焙乾四兩蒼朮泔浸一夕去皮日乾不見火枳殼去穰細切麩炒黃各二兩上細末醋糊丸如梧子大空心食前米飲下三四十丸治腸痔在腹內有鼠奶下血方腸痔下血方白蕪荑貫衆刮去黑皮狼牙根椿東引根白皮槐東引根白皮蝟皮炙焦各一分雄黃半兩水飛白鱔頭一個炙焦上細末臘月豬脂和一丸彈子大綿裹內下部日三易治痔有鼠乳結核作渴疼痛方痔有鼠乳方皂角去皮弦醋炙黃耆蜜炙荊芥穗木香露蜂房蝟皮炙焦黃銼鱉甲淡醋煮去裙膜洗淨酸醋炙黃槐子桔梗炒穿山甲銼碎蚌粉炒芍藥各一兩大黃濕紙裹甑上蒸半兩上細末煉蜜丸如梧子大每服二三十丸溫湯下食前日三服未知加至五十丸黃耆丸治遠年腸風痔漏黃耆蜜炙枳殼去穰細切麩炒黃威靈仙去苗洗各二兩續斷洗推去節銼焙槐角子北礬枯當歸洗去蘆切焙乾炒乾薑炮附子炮去皮臍生乾地黃連翹炒各半兩上細末煉蜜丸如梧子大米飲下三十丸朝推官方鱉甲丸治腸痔鱉甲淡醋煮去裙膜洗淨酸醋炙黃蝟皮炙黃焦銼穿山甲銼碎蚌粉炒白礬枯附子炮去皮臍豬牙皂角各半兩炙焦存二分性麝香一分研上細末研勻蒸餅丸如梧子大米飲下二十丸食前日三服又方槐花炒白礬枯各一兩附子半兩炮去皮臍上細末蒸餅丸如梧子大每服二十丸米飲下食前日三服以上二方龐老方衄血勞瘵吐血咯血茜梅丸治衄血無時茜草根艾葉各一兩烏梅肉焙乾半兩上細末煉蜜丸如梧子大烏梅湯下三十丸經云天暑地熱經水沸溢蓋血妄行陽勝陰也鞠運若茂之嘗苦此疾豫授此方令服後愈三黃散亦得三黃散大黃一兩濕紙裹甑上蒸黃連半兩去須黃芩去皮半兩上細末每服二錢新水調下蜜水亦得山梔子散山梔子不拘多少燒存性末之搐入鼻中立愈蔡子渥傳云同官無錫監酒趙無疵其兄衄血甚已死入殮血尚未止偶一道人過門聞其家哭詢問其由道人云是曾服丹或燒煉藥豫有藥用之即括囊間出此藥半錢匕吹入鼻中立止良久得活並傳此方治鼻衄過多昏冒欲死方梅師方用香墨濃研點入鼻中天門冬丸潤肺安血止嗽治吐血咯血天門冬一兩水浥去心甘草炙杏仁去皮尖炒熟貝母去心炒白茯苓去皮阿膠碎之蛤粉炒成珠子各半兩上細末煉蜜丸如彈子大含化一丸咽津日夜可十丸不拘時候黃耆散因嗽咯血成勞眼睛疼四肢倦怠腳無力黃耆蜜炙麥門冬水浥去心熟地黃酒灑九蒸九曝焙稱桔梗炒各半兩甘草一分炙白芍藥半兩上粗末每服四錢水一盞半薑三片煎七分去滓溫服日三白扁豆散治久嗽咯血成肺痿多吐白涎胸膈滿悶不食白扁豆飯上蒸生薑各半兩枇杷葉去毛半夏湯浸七次人參去蘆白朮各一分白茅根三分上細銼水三升煎至一升去滓下檳榔末一錢和勻分四服不拘時候治勞瘵吐血損肺及血妄行神傳剪草膏剪草一斤婺台州皆有惟婺州者可用狀如茜草又如細辛每用一斤洗淨為末入生蜜一斤和為膏以器盛之不得犯鐵九蒸九曝日一蒸曝病人五更起面東坐不得語用匙抄藥和粥服每服四匙良久用稀粟米飲壓之藥冷服粥飲亦不可太熱或吐或下皆不妨如久病肺損咯血只一服愈尋常咳嗽血妄行每服一匙可也眼目頭面口齒鼻舌唇耳羊肝丸鎮肝明目羯羊肝一具新瓦盆中爆干更焙之肝若大隻用一半甘菊花去萼梗柏子仁研羌活去蘆細辛去葉官桂不見火白朮五味子揀各半兩黃連三分去須上細末煉蜜丸如梧子大空心食前溫水下三四十丸又方白羯羊肝只用子肝一片薄切新瓦上爆干熟地黃酒灑九蒸九曝焙乾稱一兩半車前子麥門冬水浥去心菟絲子酒浸曝乾用紙條子同碾為末蕤仁決明子澤瀉地膚子去殼防風去叉股黃芩刮淨白茯苓去皮五味子揀枸杞子茺蔚子杏仁大者去皮尖炒細辛華陰者去葉苦葶藶炒令香桂心不見火青葙子以上各一兩上細末煉蜜丸如梧子大每服三四十丸溫水下日三服不拘時候張臺卿嘗苦目暗京師醫者令灸肝俞遂轉不見物因得此方服之遂明有一男子內障醫治無效因以余劑遺之一夕燈下語其家曰適偶有所見如隔門縫見火者及旦視之眼中翳膜且裂如線張云此藥靈勿妄與人忽之則無驗豫隘之且欲廣其傳也楮葉散羌活去蘆川芎洗旋覆花去梗淨防風去叉股各半兩甘草炙蒼朮泔浸一夕去皮日乾不見火楮葉自採不生楮子者桑葉並八月採陰乾稱以上各一兩甘菊花楮實蟬蛻去頭足木賊各一分上木臼中治為末茶清調下二錢早晚食後臨臥各一服暴赤眼亦治赤眼忌濕面及酒楮葉須真無實者余不堪不爾諸藥悉無效合時不得焙及犯鐵器豫觀此方取楮葉必無實者蓋陰陽二物相匹配爾有實者陽也無實取葉者陰也所以不得其真諸藥悉無效菊花散治肝腎風毒熱氣上衝眼痛甘菊花牛蒡子炒熟各八兩防風三兩去叉股白蒺藜一兩去刺甘草一兩半炙上細末每服二錢熟水調下食後臨臥服素問云久視傷血血主肝故勤書則傷肝主目昏肝傷則自生風熱氣上湊目其昏亦甚不可專服補藥須服益血鎮肝明目藥地黃丸地黃丸熟乾地黃酒灑九蒸九曝焙乾稱一兩半黃連一兩去須決明子一兩沒藥別研甘菊花防風去叉股羌活去蘆桂心不見火光明硃砂各半兩水飛上細末煉蜜丸如梧子大每服三十丸熟水下食後日三服讀書之苦傷肝損目誠然晉範寧嘗苦目痛就張湛求方湛戲之曰古方宋陽子少得其術以授魯東門伯次授左丘明世世相傳以及漢杜子夏晉左太衝凡此諸賢並有目疾得此方云用損讀書一減思慮二專內視三簡外觀四旦起晚五夜早眠六凡六物熬以神火下以氣篩蘊於胸中七日然後納諸方寸修之一時近能數其目睫遠視尺捶之餘長服不已洞見牆壁之外非但明目乃亦延年審如是而行之非可謂之嘲戲亦奇方也治頭風冷淚龐安常二方治頭風冷淚方甘菊決明子各三分白朮羌活去蘆川芎洗細辛去葉白芷不見火荊芥穗各半兩上細末每服一錢溫湯調下食後日三服又方川芎洗甘菊細辛去葉白朮白芷各一分不見火上細末蠟丸如黍米大夜臥納二丸目中一時辰換一丸荀牧仲頃年嘗謂豫曰有一人視一物為兩醫者作肝氣有餘故見一為二教服補肝藥皆不驗此何疾也豫曰孫真人云目之繫上屬於腦後出於腦中邪中於頸因逢身之虛其入深則隨目系入於腦入於腦則轉轉則目系急急則目眩以轉邪中其睛所中者不相比則睛散睛散則岐故見兩物也令服驅風入腦藥得愈犀角升麻湯王檢正希皋昔患鼻額間痛或麻痹不仁如是者數年忽一日連口唇頰車髮際皆痛不可開口雖言語飲食亦相妨左額與頰上常如糊急手觸之則痛豫作足陽明經絡受風毒傳入經絡血凝滯而不行故有此證或者以排風小續命透冰丹之類與之皆不效豫制此犀角升麻湯贈之服數日而愈上等犀角鎊一兩一分真川升麻一兩防風去叉股羌活去蘆各三分白芷不見火黃芩去皮川芎洗白附子炮各半兩甘草炙一分上粗末每服四大錢水一盞半煎至八分去滓通口服食後臨臥日三四服足陽明胃也經云腸胃為市又云陽明多血多氣胃之中腥膻五味無所不納如市鄽無所不有也六經之中血氣俱多腐熟飲食故食之毒聚於胃故此方以犀角為主解飲食之毒也陽明經絡環唇挾口起於鼻交頞中循頰車上耳前過客主人循髮際至額顱故王公所患皆此一經絡也故以升麻佐之余藥皆滌除風熱升麻黃芩專入胃經稍通醫者自能曉治鼻塞清涕出腦冷所致通草辛夷各半兩細辛去葉甘遂芎藭桂心不見火附子各一兩炮去皮臍上細末蜜丸綿裹納鼻中密封塞勿令氣泄丸如大麻子稍如微覺小痛搗薑為丸即愈此千金方也治腦冷所致此疾亦有腦熱者亦有肺寒者素問云膽移熱於腦則辛頞鼻淵又曰泣涕者腦也腦滲為涕又曰肺之液為涕其來各有由矣當審詳之鼻淵者濁涕下不止清濁亦自異治肺風鼻赤酒㾴方老山梔為末溶黃蠟等分和為丸彈子大空心茶酒嚼下半月效忌酒炙爆又方用枇杷葉去毛焙乾末之茶調下一二錢日三服治心脾壅熱生木舌腫脹玄參升麻大黃濕紙裹甑上蒸犀角鎊各三分甘草半兩炙上細末每服三錢水一盞煎至五分溫服不拘時候治口生瘡方口瘡方升麻一兩一分黃連三分去須上細末綿裹含汁咽魚骨鯁方治食諸魚骨鯁久不出方皂角末少許吹鼻中得鯁出多祕此方玄參散治懸癰腫痛不下食玄參一兩升麻射干大黃濕紙裹甑上蒸各半兩甘草一分炙上細末每服三錢水一盞煎至七分放溫時時含咽良驗紅綿散治聤耳出膿白礬煅成白灰每用一錢入胭脂一字研勻用綿杖子纏去耳中膿及黃水盡即別用綿杖子引藥入耳中令到底摻之即干如壯盛之人積熱上攻耳出膿水瘥用無憂散雄黃丸瀉三五行即瘥黃耆丸治腎虛耳鳴夜間睡著如打戰鼓覺耳內風吹更四肢抽掣痛黃耆獨莖者去蘆一兩蜜炙白蒺藜炒瓦擦揚去細碎刺羌活去蘆各半兩黑附子大者一個炮去皮臍羯羊腎一對焙乾上細末酒糊丸如梧子大每服三四十丸空心晚食前煨蔥鹽湯下地黃湯治男子二十歲因瘡毒後腎經熱右耳聽事不真每心中不意則轉覺重虛鳴疼痛生乾地黃二兩半桑白皮洗淨蜜炙黃一兩磁石搗碎水淘二三十次去盡赤汁為度二兩枳殼去穰細切麩炒黃羌活去蘆防風去叉股黃芩去皮木通去粗皮甘草各半兩炙上粗末每服四錢水一盞半煎七分去滓日二三服不拘時候黃耆湯治口乾煩躁生津液不思食黃耆蜜炙熟乾地黃酒灑九蒸九曝焙乾稱白芍藥五味子揀麥門冬各三分水浥去心白茯苓一分去皮甘草炙半兩上粗末每服三錢水一盞半薑棗烏梅同煎去滓萬病散一名無憂散此藥凡病皆治若諸風疾生瘡腫疥癬宣轉三五行自愈臟腑積冷壅滯結為風勞膀胱宿冷臟腑衰敗面色萎黃腹內有症癖氣塊並有疳蟲蛔蟲攻心腹俱痛忽中傷寒腦痛狀似山嵐時氣溫疫之疾並須急服此藥宣轉三五行自瘥或中風口喎不限時節下藥不問丈夫女人語多謇滯唾後心中涎出但十日一服不過三服永瘥又患腰膝疼痛拜跪艱難久坐不得吃食無味但服一二服見功效小兒疳痢脫肛者量兒大小與半服以下宣轉三五行自瘥丈夫女人久泄氣痢狀似休息者但服一服搜出冷膿一二升當日見效此藥不問春夏秋冬老少冷熱疾患悉皆治之任便別服諸藥無不效者服藥後全不似吃宣轉藥並不困倦不妨出入行步服藥後一兩日便覺身輕目明腰下如減十斤重物頓思飲食倍於常時蓋緣搜出臟腑中積滯蠱膿故也無孕婦人久患血勞萎黃無力者亦可依方服食功效不可具載如有孕婦人或過廢晦即不可服食若疾未除將息三兩日後再服取功效黃耆蜜炙木通去粗皮銼桑白皮淨洗蜜炙黃陳橘皮淨洗吳白朮五物各一兩木香半兩不見火胡椒半兩以上七味並稱同為細末別作一貼牽牛子五兩微炒以不通手即止勿令過熱杵羅取一兩頭末別作一貼余滓棄之上每服用黃耆散二錢牽牛子末二錢拌合令勻候天色晴明三更初以生薑一塊拍碎水一盞煎湯先用小盞子調藥頓服後更以生薑湯送下至平明時快宣轉三兩行若有蠱膿下多不妨應臟腑百病諸風冷滯悉皆出盡宜後一日內吃白粥且補解毒雄黃丸解毒治纏喉風及急喉痹或然倒僕失音不語或牙關緊急不省人事雄黃水飛一分鬱金一分巴豆去皮膜心油二七粒上為末醋煮麵糊為丸如緑豆大用熱茶清下七丸吐出頑涎立便蘇醒未吐再服如至死者心頭猶熱灌藥不下即以刀尺鐵匙斡開口灌之但藥下喉嚨無有不活吐瀉些小無妨又治上膈壅熱痰涎不利咽喉腫痛赤眼癰腫一切毒熱並宜服之如小兒患喉咽赤腫及驚熱痰涎壅塞服二丸或三丸量兒大小加減
