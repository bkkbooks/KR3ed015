body:
  text: 卷外妙香散治諸虛茯苓去皮不焙茯神去皮木不焙各二兩二分人參桔梗甘草各一兩一分薯蕷薑炙遠志去心炒黃耆各二兩三分辰砂一兩水飛麝香二分別研木香三分紙裹溫水微煨上細末每服二錢溫酒調服常服補氣血安神鎮心加料十全飲治諸虛並腹病白茯苓切微炒白朮微炒人參去蘆桂去粗皮不見火川當歸川芎黃耆熟地黃洗淨白芍藥甘草各等分腹病加後五味莪朮炮三稜炮良薑丁香不見火縮砂各等分上為粗末每服四錢重水一盞半生薑七片棗三枚煎七分去滓溫服不拘時候生胃湯治不思飲食丁香十四個白豆蔻撰大十個碾破微炒縮砂十八個同上白朮白茯苓陳皮去白炒黃耆各一分乾薑沉香甘草木香各二銖半夏撰大五個切微四片湯浸七次炒腹病加後三種莪朮炮炒厚朴薑製炒各一分三稜炮切炒二銖上十二味做一貼水二盞半生薑七片煎八分去滓空心熱服
