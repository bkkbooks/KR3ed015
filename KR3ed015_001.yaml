canonical_identifier: bkk:krp/KR3ed015/jc/v1/juan/1
seq: 1
body:
  text: 普濟本事方序醫之道大矣可以養生可以全身可以盡年可以利天下與來世是非淺識者所能為也苟精此道者通神明奪造化擅回生起死之功則精神之運必有默相於冥冥之中者豈可謂之藝與技術為等耶竊疑上古之時如岐伯輔黃帝伊尹相商王皆有方書以瘳民瘼逮及後世周有和緩秦有扁鵲漢有倉公魏有華他宋有徐文伯唐有孫思邈又皆神奇出人意表背望踵躡代不乏人自茲以往其妙不傳間有能者僅可一二數何古人精巧如是而今人之不逮也豫嘗思之古人以此救人故天畀其道使普惠含靈後人以此射利故天嗇其術而不輕畀豫無足疑者豫年十一連遭家禍父以時疫母以氣中百日之間並失怙恃痛念里無良醫束手待盡及長成人刻意方書誓欲以救物為心杳冥之中似有所警年運而往今逼桑榆漫集已試之方及所得新意録以傳遠題為普濟本事方孟棨有本事詩楊元素有本事曲皆有當時事實庶幾觀者見其曲折也豫既以救物為心豫而不求其報則是方也烏得不與衆共之
