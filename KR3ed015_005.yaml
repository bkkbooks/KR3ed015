body:
  text: 卷第三風寒濕痹白虎歷節走注諸病續斷丸治風濕四肢浮腫肌肉麻痹甚則手足無力筋脈緩急都君豫方川續斷洗推去節銼焙萆薢當歸洗去蘆薄切微炒附子焙去皮臍防風去叉股天麻各一兩乳香乳鉢坐水盆中研沒藥各半兩川芎三分上為細末煉蜜丸如梧桐子大每服三四十丸酒或飲下空心食前增損續斷丸治榮衛澀少寒濕從之痹滯關節不利而痛者楊吉老方川續斷洗推去焙筋銼薏苡仁牡丹皮山芋桂心不見火白茯苓去皮黃耆蜜炙山茱萸連核石斛去根淨洗細銼酒炒麥門冬用水浥去心各一兩乾地黃九蒸九曝焙乾稱三兩人參去蘆防風去叉股炙白朮炮鹿角膠各七錢上為細末煉蜜丸如梧子大每服三四十丸溫酒下空心食前川烏粥法治風寒濕痹麻木不仁川烏生去皮尖為末上用香熟白米作粥半碗藥末四錢同米用漫火熬熟稀薄不要稠下薑汁一茶腳許蜜三大匙攪勻空腹啜之溫為佳如是中濕更入薏苡仁末二錢增米作一中碗服此粥大治手足四肢不隨痛重不能舉者有此證預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝克故疾在末穀氣引風濕之藥徑入脾經故四肢得安比陽劑極有力豫常制此方以授人服者良驗治濕傷腎腎不養肝肝自生風遂成風濕流注四肢筋骨或入在肩髃肌肉疾痛漸入在指中薏苡仁散薏苡仁一兩當歸洗去蘆薄切焙乾小川芎乾薑炮甘草炙官桂去粗皮不見火川烏炮去皮尖防風去叉股茵芋去梗銼炒用人參去蘆羌活去蘆白朮麻黃去根節獨活黃色如鬼眼者洗去蘆焙稱各半兩上為細末每服二錢空心臨臥酒調下日三服芎附散治五種痹腿並臂間發作不定此脾胃虛衛氣不溫分肉為風寒濕所著小川芎附子炮去皮臍黃耆蜜炙白朮防風去叉股當歸洗去蘆薄切焙乾熟乾地黃酒灑九蒸九曝焙稱桂心不見火柴胡去苗淨洗甘草炙各等分上為粗末每服四錢水一盞半生薑三片棗一個同煎至七分去滓食前日三服常服不生壅熱兼消積冷麝香丸治白虎歷節諸風疼痛遊走無定狀如蟲齧晝靜夜劇及一切手足不測疼痛川烏大八角者三個生全蠍二十一個生黑豆二十一粒生地龍半兩生上為細末入麝香半字同研勻糯米糊為丸如緑豆大每服七丸甚者十丸夜臥令膈空溫酒下微出冷汗一身便瘥豫得此方凡是歷節及不測疼痛一二服便瘥在歙川日有一貴家婦人遍身走注疼痛至夜則發如蟲齧其肌多作鬼邪治豫曰此正歷節病也三服愈麻黃散歷節宜發汗麻黃一兩一分去根節羌活一兩去蘆黃芩三分去皮細辛真華陰者去葉黃耆各半兩蜜炙上為粗末每服五錢水二盞煎至八分去滓溫服接續三四服有汗畏風茵芋丸治歷節腫滿疼痛茵芋去梗銼用硃砂水飛薏苡仁各一分牽牛子一兩半郁李仁半兩去皮尖微炒上為細末煉蜜杵丸如梧子大輕粉袞為衣每服十丸至十五丸至二十丸五更初溫水下到晚未利可再一二服快利為度白粥將息牛蒡子散治風熱成歷節攻手指作赤腫麻木甚則攻肩背兩膝遇暑熱或大便祕即作牛蒡子三兩隔紙炒新豆豉炒羌活各一兩去蘆乾生地黃二兩半黃耆一兩半蜜炙上為細末湯調二錢服空心食前日三服此病多胸膈生痰久則赤腫附著肢節久而不退遂成厲風此孫真人所預戒也宜早治之厲風即怒厲賊風傷於五臟也千金方第八卷賊風第三篇中載皆云五臟虛寒厲風所損隨其病狀各有灸治甚詳萆麻法治厲風手指攣曲節間疼不可忍漸至斷落萆麻去皮黃連銼如豆各一兩上以小瓶子入水一升同浸春夏三日秋冬五日後取萆麻子一粒擘破面東以浸藥水吞下平旦服漸加至四五粒微利不妨水少更添忌動風物纍用得效神良柏葉散治厲風柏葉麻黃去根節山梔子去皮枳殼去穰銼麩炒羌活去蘆羊肝石白蒺藜炒去角升麻子芩去皮防風去叉股牛蒡子隔紙炒荊芥穗茺蔚子大黃濕紙裹甑上蒸各半兩苦參一兩烏蛇一條酒浸去皮骨焙乾上為細末每服二錢溫水調下日七八服龐老方緑靈散治肺毒瘡如大風疾用桑葉洗熟蒸日乾為末水調二錢服日四五無時出經驗方趁痛丸治走注歷節諸風軟痛卒中倒地跌撲傷損草烏頭三兩不去皮尖熟地黃酒灑九蒸九曝焙乾南星炮半夏曲白殭蠶去絲嘴烏藥各半兩並日干上為細末酒糊丸如梧子大日乾每服五七粒空心夜臥溫酒下如跌撲痛用薑汁和酒研十數粒搽之如卒中倒地薑汁茶清研五六丸灌下立醒大知禪師方烏頭丸治宿患風癬遍身黑色肌體如木皮膚粗澀及四肢麻痹宜服烏頭丸草烏頭一斤入竹籮子內以水浸用瓦子於籮內就水中瀧洗如打菱角法直候瀧洗去大皮及尖控起令乾用麻油四兩鹽四兩入銚內炒令深黃色傾出油只留鹽並烏頭再炒令黑色煙出為度取一枚劈破心內如米一點白恰好也如白多再炒趁熱杵羅為末用醋糊丸如梧子大干之每服三十丸空心晚食前溫酒下真州資福文雅白老元祐間有此疾服數年肌體黑皯頓除腳力強健視聽不衰有一宗人遍身紫癜風身如墨服逾年體悅澤教豫服之亦得一年許諸風疹瘡皆除然性差熱雖制去毒要之五七日作烏豆粥啜之為佳烏豆粥載豫章集十九卷中烏豆粥大烏豆一升隔宿洗淨用七升水浸明日入油一升炭火煅至晚當糜爛可煮三升米極熟下豆入白糖一斤和勻入生薑棋子四兩啜之風痰停飲痰癖咳嗽化痰丸治停痰宿飲半夏湯洗七次別末人參去蘆白茯苓去皮白朮桔梗切作小塊薑汁浸各一兩枳實去穰麩炒香附子麩炒舂去皮前胡去苗淨洗甘草炙各半兩上細末用半夏薑汁煮糊丸如梧子大每服三四十丸薑湯下三生丸治中脘風涎痰飲眩瞑嘔吐酸水頭疼噁心半夏二兩南星白附子各一兩上並生為末滴水丸如梧子大以生面袞衣陰乾每服十丸至二十丸生薑湯下旋覆花湯治心腹中脘痰水冷氣心下汪洋嘈雜腸鳴多唾口中清水自出脅肋急脹痛不欲食此胃氣虛冷所致其脈沉弦細遲旋覆花揀去梗細辛去葉橘皮去白桂心不見火人參去蘆甘草炙桔梗炒白芍藥半夏湯洗七次各半兩赤茯苓三分去皮上為粗末每服四錢水一盞半生薑七片煎至八分去滓溫服檳榔丸治心下停飲冷痰頭目暈眩睡臥口中多涎檳榔三分丁香一分不見火半夏湯洗七次一兩細辛去葉乾薑炮人參各半兩去蘆上為細末薑汁煮糊丸如梧子大每服二三十丸薑湯下日三服乾薑丸治酒癖停飲吐酸水聖惠方乾薑炮葛根枳殼去穰銼麩炒橘紅前胡去苗淨洗各半兩白朮半夏曲各一兩甘草炙吳茱萸湯泡七次焙各一分上為細末煉蜜丸如梧子大每服三十丸用飲下甲寅年服上二方有驗芫花丸治積聚停飲痰水生蟲久則成反胃及變為胃癰其説在靈樞及巢氏病源芫花醋製干稱一兩乾漆炒令煙盡狼牙根桔梗炒黃藜蘆炒檳榔各半兩巴豆十個炒微黑黃上為細末醋糊丸如赤豆大每服二三丸加至五七丸食前薑湯下第六卷病能論云黃帝問曰人病胃脘癰者診當何如岐伯對曰診此者當得胃脈其脈當沉細沉細氣逆逆者人迎甚盛甚盛則熱人迎者胃脈也逆而盛則熱聚於胃口而不行故胃脘為癰也此方常服化痰消堅殺蟲豫患飲癖三十年暮年多嘈雜痰飲來潮即吐有時急飲半杯即止蓋合此證也因讀巢氏病源論酒瘕云飲酒多而食谷少積久漸瘦其病常思酒不得酒則吐多睡不復能食是胃中有蟲使然名為酒瘕此藥治之要之須禁酒即易治不禁無益也巢氏病源論第十九卷論積聚癥瘕中載人之積聚癥瘕皆由飲食不節臟腑虛弱而生久則成形云昔曾有人共奴俱患鱉瘕奴死後腹中得一白鱉有人乘白馬來看此鱉白馬遺尿隨落鱉上鱉即縮頭及腳尋以馬尿灌之即化為水其主曰吾將瘥矣即服之果得瘥豫生平有二疾一則臟腑下血二則膈中停飲下血有時而止停飲則無時始因年少時夜坐為文左向伏几案是以飲食多墜向左邊中夜以後稍困乏必飲兩三杯既臥就枕又向左邊側睡氣壯盛時殊不覺三五年後覺酒止從左邊下漉漉有聲脅痛飲食殊減十數日必嘔數升酸苦水暑月只是右邊身有汗漐漐常潤左邊病處絶燥遍訪名醫及海上方服之少有驗間或中病只得月餘復作其補則如天雄附子礬石其利則如牽牛甘遂大戟備嘗之矣豫後揣度之已成癖囊如潦水之有科臼不盈科不行水盈科而行也清者可行濁者依然停滀蓋下無路以決之也是以積之五七日必嘔而去稍寬數日復作脾土也惡濕而水則流濕莫若燥脾以勝濕崇土以填科臼則疾當去矣於是悉屏諸藥一味服蒼朮三月而疾除自此一向服數年不吐不嘔胸膈寬飲啖如故暑月汗周身而身涼飲亦當中下前此飲漬其肝目亦多昏眩其後燈下能書細字皆蒼朮之力也其法蒼朮一斤去皮切末之用生油麻半兩水二盞研濾取汁大棗十五枚爛煮去皮核研以麻汁勻研成稀膏搜和入臼熟杵丸梧子大干之每日空腹用鹽湯吞下五十丸增至一百丸二百丸忌桃李雀鴿初服時必膈微燥且以茅朮制之覺燥甚進山梔散一服久之不燥矣豫服半年以後只用燥烈味極辛者削去皮不浸極有力亦自然不燥也山梔散用山梔子一味干之為末沸湯點服故知久坐不可伏向一邊時或運動亦消息之法紫蘇散治肺感風寒作嗽紫蘇葉桑白皮洗淨蜜塗炙黃青皮去白五味子揀杏仁去皮尖炒麻黃去節甘草炙各等分上細末每服二錢水一盞煎至七分溫服訶子飲利膈去涎思食止嗽訶子煨去核青皮去白麥門冬水浥去心各半兩檳榔四個半夏三分湯浸七次甘草一分炙上為粗末每服四錢水二盞生薑七片同煎至七分去滓溫服日二三服貝母湯治諸嗽久不瘥貝母一兩去心薑製半日焙黃芩生去皮乾薑生各一兩陳皮去白五味子各一兩揀桑白皮洗淨蜜炙黃半夏湯浸七次柴胡去苗淨洗桂心不見火各半兩木香一分甘草一分炙上為粗末每服五錢水一盞半杏仁七個去皮尖碎之生薑七片同煎至七分去滓熱服黃師文云戊申冬有姓蔣者其妻積年嗽制此方授之一服瘥以此治諸嗽悉皆愈積聚凝滯五噎膈氣大抵治積或以所惡者攻之以所喜者誘之則易愈如硇砂水銀治肉積神麯麥蘖治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也若用群隊之藥分其勢則難取效許嗣宗所謂譬猶獵不知兔廣絡原野冀一人獲之術亦疏矣須是認得分明是何積聚然後增加用藥不爾反有所損嗣宗自謂不著書在臨時變通也纏金丹治五種積氣及五噎胸膈不快停痰宿飲木香丁香沉香檳榔官桂去粗皮不見火胡椒硇砂研白丁香各一錢肉豆蔻飛礬各一分馬兜鈴炒南星炮五靈脂揀如鼠屎者淘去沙石日乾栝蔞根半夏湯洗七次各半兩硃砂三分水飛留半為衣上為細末入二味研藥和勻生薑汁煮糊丸如梧子大每服三丸生薑湯下或干嚼蘿蔔下枳殼散治心下蓄積痞悶或作痛多噫敗卵氣枳殼去穰銼麩炒白朮各半兩香附子一兩麩炒舂去皮檳榔三錢上為細末每服二錢米飲調下日三服不拘時候龐老方訶子丸治伏積注氣發則喘悶訶子去核白茯苓去皮桃仁去皮尖炒枳殼去穰銼麩炒桂心不見火檳榔桔梗炒白芍藥川芎洗川烏炮去皮尖人參去蘆橘紅鱉甲淡醋煮去裙膜洗淨酸醋炙黃各等分上為細末煉蜜杵丸如梧子大酒下二十丸熟水亦得硇砂丸治一切積聚有飲心痛硇砂研京三稜銼末乾薑炮白芷不見火巴豆出油各半兩大黃別末乾漆各一兩銼炒令煙盡木香青皮去白胡椒各一分檳榔肉豆蔻各一個上為細末釅醋二升煎巴豆五七沸後下三稜大黃末同煎五七沸入硇砂同煎成稀膏稠稀得所便入諸藥和勻杵丸如緑豆大年深氣塊生薑湯下四五丸食積熟水下白痢乾薑湯下赤痢甘草湯血痢當歸湯蔥酒亦得紫金丹治男子婦人患食勞氣勞遍身黃腫欲變成水腫及久患痃癖小腸膀胱面目悉黃膽礬三兩黃蠟一兩青州棗五十個上於瓷合內用頭醋五升先下礬棗漫火熬半日以來取出棗去皮核次下蠟一處更煮半日如膏入好臘茶末二兩同和丸如梧子大每服二三十丸茶酒任下如久患腸風痔漏陳米飲下宗室趙彥才下血面如蠟不進食蓋酒病也授此方服之終劑而血止面色鮮潤食亦倍常新安有一兵士亦如是與三百粒作十服亦愈治沉積感應丸此用丁香木香皆少於官局方一兩蓋欲速於去積若常服或老幼怯弱之疾尚當審之丁香木香各半兩乾薑一兩炮百草霜二兩研肉豆蔻二十個巴豆六十個取霜杏仁一百四十個去皮尖麻油一兩秋冬增半兩減蠟半兩煮酒蠟四兩上以二香薑蔻為細末並三味研極勻煉油蠟和成劑油紙裹旋丸如緑豆大熟水下五七丸此藥近年盛行於世有數方惟此真高家豫得之於王景長用之的有準枳殼散治五種積膈氣三焦痞塞胸膈滿悶背膂引疼心腹膨脹脅肋刺痛食飲不下噎塞不通嘔吐痰逆口苦吞酸羸瘦少力短氣煩悶常服順氣寬中消痃癖積聚散驚憂恚氣枳殼去穰銼麩炒京三稜橘皮去白益智仁蓬莪朮檳榔肉桂不見火各一兩或各六兩一錢乾薑炮厚朴去粗皮薑汁炙甘草炙青皮去白肉豆蔻木香各半兩或各三兩上為細末每服二錢重水一盞生薑五片棗一個同煎至七分熱服鹽點亦得不拘時候五噎膈氣丸治氣食憂勞思慮半夏湯浸七次薄切焙桔梗各二兩炒肉桂不見火枳殼去穰麩炒各一兩半上細末薑汁糊丸如梧子大薑湯下三十丸食後臨臥服熏膈丸治胸膈悶塞作噎麥門冬去浥去心甘草炙各半兩人參去蘆桂心不見火細辛去葉川椒去目併合口微火炒地上出汗遠志去心炒附子炮去皮臍乾薑炮各二錢上細末煉蜜丸如雞頭大綿裹一丸含化食後日夜三服膀胱疝氣小腸精漏念珠丸治膀胱疝氣外腎腫脹痛不可忍乳香乳鉢坐水盆中研硇砂各三錢飛黃蠟一兩上乳香研細硇砂同研勻熔蠟和丸分作一百單八以線穿之露一夕次日用蛤粉為衣旋取一粒用乳香湯吞下頃年有人貨疝氣藥肩上擔人我二字以為招目日貨數千有一國醫多金得之用之良驗硇砂丸木香沉香巴豆肉全者各一兩銅青半兩研青皮二兩不去皮硇砂一分研上前二香青皮三味細銼同巴豆漫火炒令紫色為度去巴豆為末入青砂二味研勻蒸餅和丸如梧子大每服七丸至十丸鹽湯吞下日二三服空心食前服金鈴丸治膀胱腫硬牽引疼痛及治小腸氣陰囊腫毛間水出金鈴子肉五兩茴香炒馬蘭花炒菟絲子酒浸曝乾用紙條子同碾海蛤破故紙炒香海帶淨洗各三兩木香丁香各一兩上細末糊丸如梧子大每服二三十丸溫酒鹽湯下空心食前服治小便難小腸脹不急治殺人上用蔥白三斤細銼炒令熱以帕子裹分作兩處更替尉臍下即通茴香散治膀胱氣痛茴香炒蓬莪朮金鈴子肉京三稜各一兩二味炮熟銼甘草半兩炙上細末每服二錢熱酒調下強幼安云每發痛甚連日只一二服立定頃在徽城日歙尉宋荀甫膀胱氣作疼不可忍醫者以剛劑與之疼愈甚小便不通三日矣臍下虛脹心悶豫因候之見其面赤黑脈洪大豫曰投熱藥太過陰陽痞塞氣不得通為之奈何宋尉尚手持四神丹數粒云醫者謂痛不止更服之豫曰若服此定斃後無悔渠懇求治豫適有五苓散一兩許分三服易其名用連須蔥一莖茴香一撮鹽一錢水一盞半煎七分令接續三服中夜下小便如墨汁者一二升臍下寬得睡翌日診之脈已平矣續用硇砂丸與之數日瘥大抵此疾因虛得之不可以虛而驟補藥經云邪之所湊其氣必虛留而不去其病則實故必先滌所蓄之邪然後補之是以諸方多借巴豆氣者謂此也治遺精夢漏關鎖不固金鎖丹亦名茴香丸金鎖丹舶上茴香炒葫蘆巴破故紙炒香白龍骨以上各一兩木香一兩半胡桃肉三七個研羊石子三對破開鹽半兩擦炙熟研如泥上五味為末下二味同研成膏和酒浸蒸餅杵熟丸如梧子大每服三五十丸空心溫酒下清心丸治經絡熱夢漏心忪恍惚膈熱黃柏皮一兩上為細末用生腦子一錢同研勻煉蜜丸如梧子大每服十丸至十五丸濃煎麥門冬湯下大智禪師方夢遺不可全作虛冷亦有經絡熱而得之豬苓丸上用半夏一兩破如豆大用木豬苓四兩先將一半炒半夏黃色不令焦地上出火毒半日取半夏為末糊丸如梧子大候乾更再用前豬苓末二兩炒微裂同用不泄沙瓶養之空心溫酒鹽湯下三四十丸常服於申未間冷酒下此藥治夢遺夢遺有數種下元虛憊精不禁者宜服茴香丸年壯氣盛久節淫欲經絡壅滯者宜服清心丸有情欲動中經所謂所願不得名曰白淫宜良方茯苓散正如瓶中煎湯氣盛盈溢者如瓶中湯沸而溢欲動心邪者如瓶之傾側而出虛憊不禁者如瓶中有罅而漏不可一概用藥也又有一説經曰腎氣閉即精泄素問云腎者作強之官伎巧出焉又曰腎氣藏精蓋腎能攝精氣以生育人倫者也或斂或散皆主於腎今也腎氣閉則一身之精氣無所管攝故妄行而出不時也豬苓丸一方正為此設此古方也今盛行於時而人多莫測其用藥之意蓋半夏有利性而豬苓導水蓋導腎氣使通之意也豫藥囊中嘗貯此藥緩急以與人三五服皆隨手而驗林監丞庇民亦數服而愈良方茯苓散堅白茯苓不以多少為細末每服五錢溫水調下空心食前臨臥時服一日四五服
