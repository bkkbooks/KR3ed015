body:
  text: 卷第六諸嗽虛汗消渴杏酥散治嗽杏仁去皮尖款冬花前胡半夏湯浸七次薄切焙五味子揀麻黃去根節柴胡去苗洗桑白皮蜜炙黃人參去蘆桔梗炒各等分上細末每服三錢水一盞半生薑五片同煎七分通口服柏子仁丸戢陽氣止盜汗進飲食退經絡熱新柏子仁研半夏曲各二兩牡蠣坩堝子內火煅用醋淬七次焙人參去蘆麻黃根漫火炙拭去汗吳白朮五味子揀各一兩淨麩半兩漫火炒上八味為末棗肉丸如梧子大空心米飲下三五十丸日二服得效減一服好愈即住作散調亦可牡蠣散治虛勞盜汗不止牡蠣坩堝子內煅醋淬七次焙麻黃根漫火炙拭去汗黃耆蜜炙等分上細末每服二錢水一盞煎至七分溫服防風湯治風虛多汗惡風防風五分去叉股澤瀉牡蠣炒桂枝不見火各三分上細末每服二錢食後酒調下又方白朮防風去叉股各一兩牡蠣三分炒如粉上細末酒調二錢服惡風加防風一倍氣加朮面腫加牡蠣消渴方治消渴方浮石舶上青黛各等分麝少許上細末每服一錢溫湯調下神效散治渴疾飲水不止白浮石蛤粉蟬殼去頭足各等分上細末用鯽魚膽七個調三錢服不拘時候神效古方驗録論消渴有三種一者渴而飲水多小便數脂似麩片甜者消渴病也二者吃食多不甚渴小便少似有油而數者消中病也三者渴飲水不能多但腿腫腳先瘦小陰痿弱小便數此腎消病也特忌房勞腎氣丸千金云消渴病所忌者有三一飲酒二房室三鹹食及面能忌此雖不服藥亦自可消渴之人愈與未愈常須慮患大癰必於骨節間忽發癰疽而卒豫親見友人邵任道患渴數年果以癰疽而死唐祠部李郎中論消渴者腎虛所致每發則小便甜醫者多不知其疾故古今亦闕而不言洪範言稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛是為真火上蒸脾胃變化飲食分流水穀從二陰出精氣入骨髓合榮衛行血脈營養一身其次以為脂膏其次以為血肉也其餘則為小便故小便色黃血之餘也臊氣者五臟之氣咸潤者則下味也腰腎既虛冷而不能蒸於穀氣則盡下為小便故味甘不變其色清冷則肌膚枯稿也猶如乳母穀氣上泄皆為乳汁消渴病者下泄為小便皆精氣不實於內則小便數瘦弱也又肺為五臟華蓋若下有暖氣蒸則肺潤若下冷極則陽氣不能升故肺干則渴易於痞卦乾上坤下陽無陰而不降陰無陽而不升上下不交故成痞也譬如釜中有水以火暖之其釜若以板覆之則暖氣上騰故板能潤也若無火力水氣則不能上此板則終不得潤也火力者則是腰腎強盛也常須暖補腎氣飲食得火力則潤上而易消亦免乾渴也故張仲景云宜服腎氣八味丸此疾與腳氣雖同為腎虛所致其腳氣始發於二三月盛於五六月衰於七八月凡消渴始發於七八月盛於十一月十二月衰於二三月其何故也夫腳氣壅疾也消渴宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈也審此二者疾可理也猶如善為政者寬以濟猛猛以濟寬隨事制度爾仲景云足太陽者是膀胱之經也膀胱者腎之腑小便數此為氣盛氣盛則消穀大便硬衰則為消渴也男子消渴飲一斗小便亦得一斗宜八味腎氣丸乾地黃酒灑九蒸九曝焙稱半斤山藥四兩茯苓去皮牡丹皮附子炮去皮臍桂心不見火各三兩澤瀉四兩山茱萸連核五兩上細末煉蜜丸如梧子大酒下二三十丸忌豬肉冷水蕪荑胡荽千金生地黃煎亦佳在中部心熱中治脈熱極則血氣脫色白乾燥不澤食飲不為肌膚生地黃煎消熱極強胃氣方此方制度分兩尚須臨時斟酌生地黃煎生地黃汁赤蜜各一斤人參去蘆茯苓去皮芍藥白朮各三兩甘草二兩生麥門冬一斤石膏六兩生葳蕤四兩乾地黃三兩遠志二兩豉心一斤上十三味㕮咀水一斗二升煮十一味取二升七合去滓下地黃蜜更煎取三升五合分四服三痟丸治消渴好黃連去須細末不計多少銼冬瓜肉研裂自然汁和成餅子陰乾再為末再用汁浸和如是七次即用冬瓜汁為丸梧子大每服三四十丸以冬瓜汁煎大麥仁湯送下尋常渴只一服金瘡癰疽打撲諸瘡破傷風地黃散治金瘡止血除疼痛避風續筋骨生肌肉地黃苗地菘青蒿蒼耳苗赤芍藥各五兩入水取汁石灰三升生艾汁三兩上五月五七月七午時修合以前藥汁拌石灰陰乾入黃丹三兩更杵羅細凡有金瘡傷折出血用藥封裹勿令動著十日瘥不腫不膿劉寄奴散斂金瘡口止疼痛劉寄奴一味為末摻金瘡口裹宋高祖劉裕微時伐荻見大蛇長數丈射之傷明日復至聞有杵臼聲往覘之見青衣童子數人於榛中搗藥問其故答曰我王為劉寄奴所射合藥敷之帝曰吾神何不殺之答曰寄奴王者不死不可殺帝叱之皆散收藥而返每遇金瘡敷之良驗寄奴高祖小字也此藥非只治金瘡治湯火瘡至妙經驗方云劉寄奴為末先以糯米漿用雞翎掃傷著處後摻藥末在上並不痛亦無痕大凡傷著急用鹽末摻之護肉不壞然後藥敷之蕓薹散治從高墮下墜損惡血在骨節間疼痛荊芥穗藕節各二兩陰乾蕓薹子川芒硝馬齒莧各一兩陰乾上細末用蘇枋木半兩酒一大盞煎至七分調下二錢服不拘時候夢龜散治腕折傷筋損骨疼痛不可忍生地黃一斤切藏瓜薑糟一斤生薑四兩切上都炒令勻熱以布裹罨傷折處冷則易之水仙散治打撲墜損惡血攻心悶亂疼痛未展荷葉陰乾一味為末食前以童子熱小便一小盞調下三錢以利下惡物為度一方用大幹荷葉五片燒令煙盡細研作一服如上服之檳榔散長肉止痛生肌檳榔黃連去須木香各等分上為細末薄貼瘡上神效治打撲傷損及一切癰腫未破令內消方生地黃研如泥成膏木香細末上以地黃膏隨腫大小攤於紙上摻木香末一層又再攤地黃貼腫上不過三五度即愈元祐中宋人許元公赴省試卷過興國寺橋值微雨地滑墜馬右臂臼脫路中一人云急與挼入臼中血漬臼中即難治也僕者如其説神已昏亦不覺痛也遂僦臥轎舁至景德須臾親舊集議所醫者或云非録事巷田馬騎不能了此疾急鞭馬召至則已日暮矣田秉燭視其面色云尚可治此疾料理費力先議所酬方敢用藥此公去省試只旬日又是右臂正妨作字今須作兩等商量如旬日內安痊如舊不妨就試作一等價如至期未能就試即減數別作一等價悉如其説遂用藥封其腫黯處至中夜方省達旦已痛止矣翌日至悉去其封藥損處已白其瘀血青黯已移在臂臼之上如是數日易之其腫黯直至肩背於是用藥下之瀉黑血一二升三五日如舊臂亦不痛遂得赴試可謂妙醫矣元公云若在外方遭此厄微田生吾終作折臂鬼矣故知墮損手足臼脫急須挼入不爾終成蘆節也宣和中有一國醫忽承快行宣押就一佛剎醫內人限目今便行鞭馬至則寂未有人須臾臥轎中扶下一內人又一快行送至奉旨取軍令狀限日下安痊醫診視之已昏死矣問其從人皆不知病之由惶恐無地良久有二三老內人至下轎環而泣之方得其實云因蹴鞦韆自空而下墜死醫者云打撲傷損自屬外科欲申明又恐後時參差不測再視之微覺有氣忽憶藥篋中有蘇合香丸急取半兩於火上焙去腦麝用酒半升研化灌之至三更方呻吟五更下惡血數升調理數日得痊豫謂正當下蘇合香丸蓋從高墜下必挾驚悸血氣錯亂此藥非特逐瘀血而又醒氣醫偶用之遂見功此藥居家不可缺如氣厥鬼邪殗殜傳尸心痛時疾之類皆治良方載甚詳須自合為佳爾見第一卷發背王蘧發背方序云元祐三年夏四月官京師疽發於背召國醫治之逾月勢益甚得徐州蕭縣人張生以艾火加瘡上灸之自旦及暮凡一百五十壯知痛乃已明日鑷去黑痂膿血盡潰膚理皆紅亦不復痛始別以藥敷之日一易焉易時旋剪去黑爛惡肉月許瘡乃平是歲秋夏間京師士大夫病疽者七人余獨生此雖司命事然固有料理不知其方遂至不幸者以人意論之可為慨然於是撰次前後所得方模版以施庶幾古人濟衆之意紹聖三年三月日題柞木散治諸般癰腫發背柞木葉四兩干乾荷葉金嬰根萱草也甘草節地榆各一兩上同銼搗為煮散每服半兩水二碗煎至一碗分兩服早晚各一並滓再煎一服膿血者自干未成者自消忌飲食毒斂瘡內消方黃明膠一兩水半升消了入黃丹一兩再煮三五沸又放溫冷以雞毛掃在瘡口上如未成即塗腫處自消拔毒七寶散治癰疽止痛乾荷葉心當中如錢片不計多少為粗末每用三匙水二碗漫火煎至一碗半放溫淋洗揩乾以太白膏敷沈遇明一方荷葉一兩藁本半兩為末如前用太白膏寒水石水飛過用臘月豬脂調成膏隨瘡大小用薄紙攤貼之國老膏橫紋甘草一斤擘開椎碎用水一斗浸兩宿夏浸一宿挼細夾絹濾去滓入銀石器內漫火熬成膏分作三服每發以溫酒半升調下更量年齒老少分作數服黃耆散令發背自潰綿黃耆細者洗焙一兩甘草炙半兩皂角刺擇紅紫者銼麩炒黃一兩上細末每服一大錢酒一盞乳香一塊煎七分去滓溫服加當歸赤芍藥各半兩尤效速生犀散托裡排膿皂角刺不計多少粗大紫色者上藏瓶中鹽泥固濟炭火燒過存性放冷出碾為細末每服一錢薄酒微溫調下暑月用陳米飲下黃耆丸清心內固綿黃耆蜜炙人參去蘆各一兩上細末入真生龍腦一錢研細用生藕汁和丸緑豆大每服三十丸溫熟水下加至四十丸日三服內托散治一切瘡毒緑豆粉一兩細研通明乳香一分漫火於銀石器中炒手指攪使干可捻急傾出在紙上用扇扇冷便研令極細用上同研勻凡一切惡瘡難名癰腫每用二錢至三錢食後臨臥濃煎甘草湯調下如打撲及諸般內損用溫酒調下食後空心服些少即內消大損則敗血從大便出矣治發背癰疽方車螯殼一兩個泥固濟火煅為末栝蔞一枚燈心五十莖蜜一大匙用酒一升煎下三味微熟調末二大錢服不過二服止痛去毒治癰疽已有瘡眼未出膿痛不可忍用此藥絍即膿出巴豆一個去皮膜不去心油鹽豉十四個口中含去皮令軟同研爛入真麝少許如難丸入少稀糊捏作餅子或如鼠糞尖或丸子臨時看瘡口絍之只以紙捻子送入藥便不用紙捻子須臾必痛忍之良久膿出治發背方草決明生用一升搗碎生甘草一兩亦碎水三升煮取一升溫分二服大抵血滯則生瘡肝為宿血之臟而決明和肝氣不損元氣也玉真散治破傷風及打撲傷損天南星湯洗七次防風去叉股各等分上細末如破傷以藥敷貼瘡口然後以溫酒調下一錢如牙關急緊角弓反張用藥二錢童子小便調下或因鬥傷相打內有傷損之人以藥二錢溫酒調下打傷至死但心頭微溫以童子小便調下二錢並三服可救二人性命
