body:
  text: 卷第七諸蟲飛尸鬼疰制諸蟲方白蕪荑檳榔各一兩上為細末蒸餅丸如梧子大每服十五丸至二十丸溫湯下去勞熱方制蟲解勞悅澤肌膚檳榔一兩半乾漆燒令煙盡半兩龍膽一兩上為細末煉蜜丸如梧子大每服十丸至十五丸熟水下治寸白蟲方黑鉛灰抄四錢一服先吃豬肉脯少許一時來卻用沙糖濃水半盞調灰五更服蟲盡下白粥將息一日良方療寸白用錫沙蕪荑檳榔者極佳豫宣和中每覺心中多嘈雜意謂飲作又疑是蟲漫依良方所說服翌日下蟲二條一長二尺五寸頭扁闊尾尖鋭每寸作一節斑斑如錦紋一條皆寸斷矣千金謂勞則生熱熱則生蟲心蟲曰蛔脾蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶五蟲皆能殺人惟肺蟲為急肺蟲居肺葉之內蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難有人說道藏中載諸蟲頭皆向下行唯是初一至初五以前頭上行故用藥者多取月朏以前蓋謂是也良方療寸白蟲方錫沙作銀泥者無即以黃丹代油和如梧子大蕪荑仁檳榔二物等分為末上煎石榴根濃汁半升下散三錢丸五枚中夜服旦日取下治飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪者聞哀哭便發風尸者淫濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纏骨結臟衝心脅每發絞切遇寒冷便作注尸者舉身沉重精神錯雜常覺昏每發節氣致變輒成大惡皆宜用此方忍冬葉銼數斛煮取濃汁稠煎之服如雞子大一枚日三太一神精丹蘇合香丸治此疾第一雄朱散因喪驚憂悲哀煩惱感尸氣而成諸變動不已似冷似熱風氣觸則發雄黃水飛硃砂水飛桔梗炒羌活去蘆當歸洗去蘆薄切焙乾稱升麻川烏炮去皮尖芍藥犀角鎊龍齒研鬼箭削取羽炒川芎洗白殭蠶去絲嘴炒陳皮去白山梔子去皮南星炮木香虎脛骨醋炙紫蘇子炒莽草枳殼去穰麩炒黃白朮黃芩去皮各一分麻黃半兩去根節蜈蚣二條去頭足酒炙檳榔二個全蠍炒一分上為細末每服二錢酒調下日三服頃在徽城日嘗修合神精丹一料庚申年豫家一婦人夢魘覺後心一點痛不可忍昏悶一時許豫忽憶神精丹有此一證取三粒令服之遂至府過廳少頃歸已無病矣云服藥竟痛止神醒今如常矣自後相識稍有邪氣與一二服無不應驗方在千金中治中風之要藥但近世少得曾青磁石為難合爾神精丹在千金方十二卷中人平居無疾苦忽如死人身不動搖默默不知人目閉不能開口噤不能言或微知人惡聞人聲但如眩冒移時方寤此由已汗過多血少氣並於血陽獨上而不下氣壅塞而不行故身如死氣過血還陰陽復通故移時方寤名曰鬱冒亦名血厥婦人多有之宜白薇湯倉公散白薇湯白薇當歸洗去蘆薄切焙乾稱各一兩人參去蘆半兩甘草一分炙上粗末每服五錢水二盞煎至一盞去滓溫服倉公散瓜蒂藜蘆雄黃水飛礬石煅上各等分細末少許吹入鼻中腹脅疼痛枳實散治男子兩脅疼痛枳實一兩麩炒去穰白芍藥炒黃雀腦芎人參去蘆各半兩上細末薑棗湯調下二錢酒亦得食前日三服葛根湯治脅肋下痛不美食葛根半兩桔梗炒防風去叉股白芍藥甘草炙訶子去核川芎洗白朮枳殼各一兩去穰麩炒黃上粗末每服四錢水一盞半薑棗同煎至七分去滓溫服日四五服枳殼煮散治悲哀煩惱傷肝氣至兩脅骨疼筋脈緊急腰腳重滯兩股筋急兩脅牽痛四肢不能舉漸至脊膂攣急此藥大治脅痛枳殼去穰麩炒黃細辛去葉桔梗炒防風去叉股川芎各四兩葛根一兩半甘草二兩炙上粗末每服四錢水一盞半姜三片煎至七分去滓空心食前溫服薏苡仁丸治脅痛如前兼去手足枯悴薏苡仁一兩石斛用細者去根淨洗細銼三分附子半兩炮去皮臍牛膝酒浸水洗焙乾生乾地黃各三分柏子仁研人參去蘆枳殼去穰麩炒黃細辛去葉川芎洗當歸洗去蘆焙乾各半兩甘草炙上細末煉蜜丸如梧子大每服三四十丸酒吞下空心食前日三服丸子可食前煮散可食後相兼服為佳桂枝散治因驚傷肝脅骨里疼痛不已枳殼一兩小者去穰麩炒黃桂枝去皮半兩不見火上細末每服二錢薑棗湯調下芎葛湯治脅下疼痛不可忍兼治腳弱川芎洗乾葛桂枝去皮不見火細辛去葉枳殼去穰麩炒黃人參去蘆芍藥麻黃去節防風去叉股各半兩甘草一分炙上粗末每服五錢水二盞生薑三片同煎至七分去滓溫服日三服有汗避風沈存中良方載頃在建康醫者王琪言諸氣唯膀胱氣脅下痛最難治謂神保丸能治之熙寧中病項筋痛諸醫皆作風治之數月不瘥乃流入背膂久之又注右臂攣痛甚苦憶琪語有此一證乃合服之一服而瘥再發又一服瘥神保丸木香胡椒各二錢半乾蠍十個去毒巴豆十個去皮心研上為細末湯釋蒸餅丸麻子大硃砂為衣每服三粒心膈痛柿蒂燈心湯下腹痛柿蒂煨姜煎湯下血痛炒姜醋湯下肺氣甚者白礬蛤粉各三分黃丹一分同研為散煎桑根白皮糯米飲調下三錢小喘只用桑皮糯米飲下腎氣脅下痛茴香酒下大便不通蜜湯調檳榔末一錢下氣噎木香湯下宿食不消茶酒漿飲任下治脅下風氣作塊寒疝發作連少腹痛湊心其積屬肝在右脅下故病發則右邊手足頭面昏痛不思食止頭冷方乾葛一兩麻黃三分去節側子一個炮去皮臍川芎洗防風去叉股枳實麩炒去穰芍藥桂枝去粗皮不見火羌活去蘆洗甘草炙當歸洗去蘆薄切焙乾各四錢上粗末每服四錢水一盞半姜三片同煎至七分去滓通口服日三四服有汗避風雜病雄黃治瘡瘍尚矣周禮瘍醫凡療瘍以五毒攻之鄭康成注云今醫方合五毒之藥用黃堥置石膽丹砂雄黃礜石磁石其中燒之三日三夜其煙上著以雞羽取之以注瘡惡肉破骨則盡出楊大年嘗筆記其事有族人楊嵎年少時有瘍生於頰連齒輔車外腫若覆甌內潰出膿血不輟吐之痛楚難忍療之百方彌年不瘥人語之依鄭法制藥成注之瘡中少頃朽骨連兩齒潰出遂愈後便安寧信古方攻病之速也黃堥即瓦合也崔元亮海上方治一切心痛無問新久以生地黃一味隨人所食多少搗取汁搜面作䬪飥或作冷淘良久當利出蟲長一尺許頭似壁宮後不復患劉禹錫傳信方貞元十年通事舍人崔抗女患心痛垂氣絶遂作地黃冷淘食之便吐一物可方一寸以來如蝦蟆狀無目足等微似有口蓋為此物所食自此頓愈面中忌用鹽唐硤州王及郎中充西路安撫使判官乘騾入駱谷及宿有痔疾因此大作其狀如胡瓜貫於腸頭熱如煻灰火至驛僵仆主驛吏云此病某曾患來須灸即瘥用槐枝濃煎湯先洗痔便以艾炷灸其上連灸三五壯忽覺一道熱氣入腸中因大轉瀉先血後穢一時至痛楚瀉後遂失胡瓜登騾而馳服桑枝法桑枝一小升細切炒香以水三大升煎取二升一日服盡無時圖經云桑枝性平不冷不熱可以常服療體中風癢乾燥腳氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服輕身聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱朴子政和間豫嘗病兩臂痛服諸藥不效依此作數劑臂痛即愈治目方用黃連多矣而羊肝丸尤奇異用黃連末一兩白羊子肝一具去膜同於砂盆內研令極細衆手為丸如梧子大每服以溫水下三十丸連作五劑但是諸眼目疾及障翳青盲皆治忌豬肉冷水江左嘗有商人左膊上有瘡如人面亦無他苦商人戲滴酒口中其面亦赤以物食之亦能食多則覺膊內肉脹起或不食之則一臂痹有善醫者教其歷試諸藥不以草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒毀其口灌之數日成痂遂愈然不知何疾也唐鄭相云豫為南海節度七十有五越地卑濕傷於內外衆疾俱作陽氣衰絶乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶獻此方經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京録方傳之其方用破故紙十兩揀洗為末用胡桃肉去皮二十兩研如泥即入前末更以好煉蜜和勻如飴盛瓷器中旦日以溫酒化藥一匙服之不飲酒溫熟水化下彌久則延年益氣悅心明目補添筋骨但禁食蕓薹羊血番人呼為補骨脂丸江陵府節度使進豨蘞丸方云臣有弟訮年三十一中風床枕五年百醫不瘥有道人鍾針者因睹此患曰可餌豨蘞丸必愈其藥多生沃壤五月間收洗去土摘其葉及枝頭九蒸九曝不必太燥但取蒸為度取為末煉蜜丸如梧子大空心溫酒或米飲下二十丸至三十丸所患忽加不得憂至四十丸必復如故至五十服當復丁壯奉宣付醫院詳録又知益州張詠進表云臣因換龍興觀掘得一碑內說修養氣術並藥方二件依方差人訪問採覓其草頗有異金稜紫線素根紫荄對節而生蜀號火杴莖葉頗同蒼耳誰知至賤之中乃有殊常之效臣自吃至百服眼目輕明服至千服髭鬢烏黑筋力輕健效驗多端臣本州有都押衙羅守一曾因中風墜馬失音不語臣與十服其病立痊又和尚知嚴年七十患偏風口眼喎斜時時吐涎臣與七服亦便瘥今合一百劑差職員史元奏進唐柳柳州纂救死三方云元和十二年二月得腳氣夜半痞絶脅有塊大如石且死咽塞不知人三日家人號哭滎陽鄭洵美傳杉木湯服半食頃大下三次氣通塊散用杉木節一大片橘葉一斤無葉以皮代之大腹檳榔七個合搗碎之童子小便三大升共煮取一升半分二服若一服得快利停後服以前三死皆死矣會有教者皆得不死恐他人不幸有類余病故傳焉崔給事頃在澤潞與李抱真作判官李相方以球杖按球子其軍將以杖相格乘勢不能止因傷李相拇指並爪甲擘破遽索金瘡藥裹之強坐頻索酒飲至數杯已過量而面色愈青忍痛不止有軍吏言取蔥新折者便入煻灰火煨乘熱剝皮擘開其間有涕取罨損處仍多煨取續續易熱者凡三易之面色卻赤斯須云已不痛凡十數度易用熱蔥並涕裹纏遂畢席笑語驢尿治反胃外臺載昔幼年曾經患此疾每食餅及羹粥等須臾吐出貞觀中許奉御兄弟及柴蔣等時稱名醫奉敕令治罄竭其術竟不能療漸至羸憊死在朝夕忽有一衛士云服驢小便極驗且服二合後食惟吐一半晡時又服二合人定時食粥吐即便定迄至今日午時奏知大內中五六人患反胃同服一時俱瘥此藥稍有毒服時不可過多盛取尿熱服二合病深七日以來服之良驗葛洪云鬼疰者是五尸之一疰又挾諸鬼邪為害其病變動乃有三十六種至九十九種大略使人寒熱淋瀝沉沉默默不的知所苦無處不惡纍年積月漸就沉滯以至於死傳與旁人及至滅門覺如是候者急治獺肝一具陰乾杵末水服方寸匕日三未知再服肘後出此方神良
