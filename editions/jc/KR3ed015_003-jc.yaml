body:
  text: 卷外灸中風口眼喎斜不正者家藏方上於耳垂下麥粒大灸三壯左引右灸右引左灸防風散治頭目不清神志不爽常服去風明目防風去蘆頭川芎香白芷甘菊花甘草炙上各等分為細末每服二錢荊芥湯調下食後烏香散治陽虛上攻頭項俱痛不可忍者細辛去葉土新茶芽炒草烏頭大者去皮尖炮裂切如麻豆大碎鹽炒各等分上件㕮咀每服二錢入麝香末半錢水一盞半煎至八分去滓溫服不拘時候海上方茶芽四兩細辛草烏各二兩或為細末每服一大錢茶清調下臨臥或食後
