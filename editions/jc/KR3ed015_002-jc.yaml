body:
  text: 卷第一中風肝膽筋骨諸風真珠丸治肝經因虛內受風邪臥則魂散而不守狀若驚悸真珠丸真珠母大於常珠形狀不一真珠母未鑽真珠也三分研如粉同碾當歸洗去蘆薄切焙乾後秤熟乾地黃酒灑九蒸九曝焙乾各一兩半人參去蘆酸棗仁微炒去皮研柏子仁各一兩研犀角鎊為細末茯神去木沉香龍齒各半兩上為細末煉蜜為丸如梧子大辰砂為衣每服四五十丸金銀薄荷湯下日午夜臥服獨活湯獨活黃色如鬼眼者去蘆洗焙秤羌活去蘆防風去釵股人參去蘆前胡去苗淨洗細辛華陰者去葉五味子揀沙參白茯苓去皮半夏曲酸棗仁微炒去皮研甘草各一兩炙上為粗末每服四大錢水一盞半生薑三片烏梅半個同煎至八分去滓不拘時候紹興癸丑予待次四明有董生者患神氣不寧每臥則魂飛揚覺身在床而神魂離體驚悸多魘通夕無寐更數醫而不效予為診視詢之曰醫作何病治董曰眾皆以為心病予曰以脈言之肝經受邪非心病也肝經因虛邪氣襲之肝藏魂者也遊魂為變平人肝不受邪故臥則魂歸於肝神靜而得寐今肝有邪魂不得歸是以臥則魂揚若離體也肝主怒故小怒則劇董欣然曰前此未之聞雖未服藥已覺沉疴去體矣願求藥法予曰公且持此說與眾醫議所治之方而徐質之閱旬日復至云醫遍議古今方書無與病相對者故予處此二方以贈服一月而病悉除此方大抵以真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝相類故也龍齒虎睛今人例作鎮心藥殊不知龍齒安魂虎睛定魄各言類也東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專靜故魄止而有守予謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物有成理而不說亦在夫人達之而已星附散治中風雖能言口不喎斜而手足嚲曳脈虛浮而數風中腑也蓋風中脈則口眼喎斜風中腑則肢體廢風中臟則性命危凡風中腑宜汗而解星附散天南星大者半夏二味薄切薑汁浸透黑附子炮裂去皮臍白附子炮微黃川烏灰火炮裂去皮尖用白殭蠶去絲嘴炒沒藥別研入藥人參去蘆白茯苓去皮以上各等分上為粗末每服二錢水酒各一盞同煎至八分去滓熱服二三服汗出瘥頃在桐廬有人患此症三投此藥得汗手足能舉二生散治體虛有風外受寒濕身如在空中二生散生附子去皮臍生天南星各等分上二味㕮咀每服四大錢水一盞半生薑十片漫火煎至八分去滓服戊午年予在新安有此疾張醫博士發授此方三服愈煎不熟有大毒令人發腫增病救急稀涎散治中風忽然昏若醉形體昏悶四肢不收風涎潮於上膈氣閉不通豬牙皂角四挺肥實不蠹者去黑皮晉礬光明者一兩上細末研勻輕者半錢重者三字匕溫水調灌下不大嘔吐但微微冷涎出一二升便得醒醒次緩而調治不可便大段亦恐過傷人孫兆方勝金丸治中風同前證豬牙皂角二兩捶碎水一升同生薄荷一處搗取汁漫火熬成膏生薄荷半斤瓜蒂末一兩藜蘆末一兩硃砂半兩上將硃砂末一分與二味末研勻用膏子搜和丸如龍眼大以余朱為衣溫酒化一丸甚者二丸以吐為度得吐即省不省者不可治必用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關緊急氣閉不行湯藥不能入命在須臾執以無吐法可乎但不當用銀粉藥恐損脾壞人四肢爾予每用此二方每每有驗拒風丹治一切風川芎四兩防風去釵股者一兩半天麻去蘆一兩甘草一兩炙細辛去葉三錢半蓽茇半兩上細末煉蜜和杵每兩作一十丸每服一粒細嚼荊芥湯或溫酒下尋常些小傷風頭痛鼻塞項強筋急皆可服予家常合老幼所須之藥世言氣中者雖不見於方書然暴喜傷陽暴怒傷陰憂愁不意氣多厥逆往往多得此疾便覺涎潮昏塞牙關緊急若概作中風候用藥非止不相當多致殺人元祐庚午母氏親遭此禍至今飲恨母氏平時食素氣血羸弱因先子捐館憂惱忽一日氣厥牙噤涎潮有一里醫便作中風以大通丸三粒下之大下數行一夕而去予常痛恨每見此症急化蘇合香丸四五粒灌之便醒然後隨其虛實寒熱而調治之無不愈者經云無故而喑脈不至不治自已謂氣暴逆也氣復則已審如是雖不服藥亦可蘇合香丸療傳屍骨蒸殗殜肺痿疰忤鬼氣卒心痛霍亂吐利時氣鬼魅瘴瘧赤白暴利瘀血月閉痃癖下腫驚癇鬼忤中人小兒吐乳大人狐貍等病蘇合香油一兩入安息香膏內白朮二兩丁香二兩硃砂研水飛二兩木香二兩白檀銼二兩薰陸香別研二兩沉香二兩烏犀鎊屑二兩蓽茇二兩安息香二兩別為末用無灰酒一斤熬膏香附去毛二兩訶藜勒煨去核二兩龍腦研一兩麝香研二兩上為細末入研藥勻用安息香膏並煉白蜜和劑每服旋丸如梧桐子大早朝取井華水溫冷任意化服四丸老人小兒可服一丸溫酒化服亦得並空心服之用蠟紙裹一丸如彈子大緋絹袋盛當心帶之一切邪神不敢近去龍腦名麝香蘇合丸治一切冷氣胸膈噎塞腸中虛鳴宿飲不消餘證並同範子默記崇寧中凡兩中風始則口眼喎斜次則涎潮閉塞左右共灸十二穴得氣通十二穴者謂聽會頰車地倉百會肩髃曲池風市足三里絕骨髮際大椎風池也依而用之無不立效灸中風十二穴聽會二穴在耳微前陷者中張口有穴耳前陷中動脈宛宛中側臥張口取之治耳聾耳中狀如蟬聲牙車脫臼日可灸五壯至三七壯止十日報灸即愈忌動風生冷豬魚等物灸經云日灸五壯至七壯止可經十日許還依前灸之慎冷食頰車二穴在耳下曲頰端陷中側臥張口取之治牙關不開口噤不語失音牙車疼痛頷頰腫頸強不得回顧日灸七壯至七七壯止灸如大麥忌如常法地倉二穴俠口吻傍四分外如近下有脈微微動蹺脈手陽明之交若久患風其脈亦有不動者治偏風口喎目不得開失音不語飲食不收水漿漏落眼瞤動不止病左治右病右治左日灸二七壯重者七七壯艾炷如粗敘腳大若炷太大口轉喎卻灸承漿七七壯即愈面並熱食房事等忌如常百會穴在頭頂中宛宛陷中治小兒脫肛久不瘥風癇中風角弓反張口吐涎沫可灸七壯至七七壯頭頂皮膚淺薄凡灸不過七七壯肩髃穴在肩端兩骨間陷者宛宛中舉臂取之治偏風半身不遂熱風癮疹手臂攣急捉物不得挽弓不開臂細無力筋骨痠疼可七壯至二七壯若偏風不遂可七七壯止曲池二穴臂相連處以手拱胸取之紋盡處是穴治偏風半身不遂刺風癮疹筋緩捉物不得挽弓不開屈伸難可灸三壯針灸經云日灸七壯至二百壯且停十餘日更下火還至二百壯罷云云風市即中瀆二穴在髀骨外膝上五寸分肉間陷中治寒氣客於分肉之間痛攻上下筋痹不仁可灸五壯足三里二穴在膝下三寸䯒外廉兩筋間舉足取之治胃中寒心腹脹滿胃氣不足聞食臭腸鳴腹痛食不化此穴諸病皆治及療食氣水氣蠱毒痃癖四肢腫滿膝䯒痠痛目不明五勞七傷胸中瘀血乳癰可灸三壯人年三十以上皆宜灸此穴日灸七壯至一百壯止絕骨一穴在足外踝上四寸治風痹不仁膝䯒酸可灸三壯髮際即神庭穴在直鼻上額入髮際五分治癲疾風癇戴目上下不識人及頭風目眩鼻出清涕不止驚悸不得安寢可灸二壯至七七壯止凡療風灸多即傷惟宜七壯至三七壯針即發狂大椎一穴在項後第一椎上陷中治五勞七傷頸項強不得回顧風勞食氣灸以年為壯或曰日灸七壯至七七壯風池二穴在腦後入髮際陷中治頸項痛不得回顧腰佝僂引項筋無力不收可灸七壯元符中一宗人得疾逾年不瘥謁醫於王思和繹思和具脈狀云病因驚恐肝臟為邪邪來乘陽明之經即胃是也邪盛不畏勝我者又來乘肺肺緣久病氣弱金勝無能受肝凌侮其病時復頭眩瘛瘲搐掣心胞伏涎久之則害脾氣要當平肝氣使歸經則脾不受克脾為中州土主四肢一體之事脾氣正則土生金金旺則肺安矣今疾欲作時覺氣上衝者是肝侮肺肺不受侮故有此上衝肝勝則復受金克故搐搦也以熱藥治之則風愈甚以冷藥治之則氣已虛肺屬金金為清化便覺臟腑不調今用中和溫藥抑肝補脾漸可安愈今心忪非心忪也胃之大絡名曰虛里絡胸膈及兩乳間虛而有痰則動更須時發一陣熱者是其候也服下三方一月而愈思和名醫寓儀真時人少知者後至都下聲名籍甚為醫官政和中度為黃冠終蕊珠侍宸續斷湯續斷洗銼焙乾杜仲銼如豆炒令黑肉桂去粗皮不見火防風去釵股甘草炙牛膝洗淨銼焙酒浸一宿再焙白茯苓去皮細辛去葉人參去蘆當歸洗去蘆薄切焙乾白芍藥各一兩川芎洗秦艽去蘆洗川獨活黃色如鬼眼者去蘆洗焙秤熟地黃酒灑九蒸九曝焙乾秤各三兩上為細末每服二錢水一盞生薑三片棗一個同煎至七分空心食前稍熱服山蕷丸山蕷人參去蘆沙參洗遠志去心銼洗炒黃色防風去釵股真珠母未鑽真珠研如粉紫石英研水飛茯神去木虎骨各一兩酥塗炙焦黃酒或羊脂亦可虎睛一對酒浸切焙龍齒黏舌者五味子揀丹參洗石菖蒲去須洗華陰細辛去葉各一分上為細末煉蜜為丸梧子大每服三十丸至五十丸金銀薄荷湯下食後臨臥獨活散川獨活黃色如鬼眼者去蘆洗焙秤白朮白茯苓去皮秦艽洗去蘆葳蕤洗柏子仁研甘草炙各一兩犀角鎊川椒去目併合口微火炒地上出汗熟乾地黃酒灑九蒸九曝焙乾秤枳實湯浸洗去穰薄切麩炒白芷不見火官桂去粗皮不見火各半兩人參去蘆一分上為細末每服二錢水一盞生薑三片棗一個同煎至七分不拘時候服地黃酒治風在肝脾語謇腳弱大便多秘熟乾地黃酒灑九蒸九曝焙乾秤四兩附子炮去皮尖茵芋去梗銼炒用羌活去蘆防風去釵股芎藭各一兩石斛洗去根二兩丹參二兩半牛蒡根二兩半牛膝酒浸水洗焙杜仲去皮銼如豆炒令黑桂枝不見火各一兩半大麻子去皮一升上細銼入絹袋盛寬貯之用無灰酒一斛五升封漬七日逾日空心食前飲一盞常醺勿令吐防風湯治中風內虛腳弱語謇石斛洗去根一兩半熟乾地黃酒灑九蒸九曝焙乾秤杜仲去皮銼如豆炒令黑丹參各一兩一分防風去釵股川芎洗麥門冬用水浥去心桂枝不見火川獨活黃色如鬼眼者去蘆洗焙秤各一兩上為粗末每服五錢水一大盞半棗二枚同煎八分去滓溫服竹瀝湯治中風入脾肝經年四肢不遂舌強語謇威靈仙去苗洗附子炮製去皮臍桔梗炒防風去釵股蔓荊子揀枳殼去穰細切麩炒黃川芎洗當歸洗去蘆薄切焙秤各等分上為粗末每服四錢水一盞竹瀝半盞生薑三片同煎至八分去滓溫服日三四忌茗防己湯治久風邪入肝脾二經言語不傳漢防己防風去釵股桂心不見火附子炮裂去皮各半兩威靈仙去苗洗三分麻黃半兩去節上為粗末每服四錢水一盞引子半盞煎至七分去滓溫服日三四引子用竹瀝荊瀝地黃汁各一盞薑汁半盞和勻用上四方龐先生傳木瓜煎治筋急項強不可轉側宣州木瓜二個取蓋去穰沒藥二兩研乳香一分乳缽坐水盆中研上二味納木瓜中用蓋子合了竹籤定之飯上蒸三四次爛研成膏子每服三五匙地黃酒化下生地黃汁半盞無灰上醞二盞和之用八分一盞熱暖化膏有人患此病自午後發黃昏時定予曰此患必先從足起經言十二經絡各有筋惟足少陰之筋自足至頂大抵筋者肝之合也日中至黃昏天之陽陽中之陰也又曰陽中之陰肺也自離至兌陰旺陽弱之時故靈寶畢法云離至乾腎氣絕而肝氣弱肝腎二臟受陰氣故發於是時予授此方三服而愈同官歙丞張德操常言其內子昔患筋攣腳不能屈伸者逾年動則令人持抱求醫於泗水楊吉老吉老云此筋病也宜服下三方服一年而愈養血地黃丸治筋極春夏服之熟乾地黃酒灑九蒸九曝焙乾秤十分頑荊一分山茱萸五分連核地膚子黑狗脊炙去毛淨焙銼白朮乾漆炒令煙出蠐螬乾炒天雄炮去皮車前子各三分萆薢山芋澤瀉牛膝酒浸水洗焙乾各一兩上為細末煉蜜和杵丸如梧子大每服五十丸溫酒下空心夜臥服羚羊角湯治筋痹肢節束痛秋服之羚羊角鎊肉桂不見火附子炮去皮臍獨活黃色如鬼眼者去蘆洗焙秤各一兩三錢半白芍藥防風去釵股炙芎藭各一兩上為粗末每服三大錢水一盞半生薑三片同煎至八分取清汁服日可二三服烏頭湯治寒冷濕痹留於筋脈攣縮不得轉側冬服之大烏頭炮去皮臍細辛去葉川椒去目併合口微炒地上出汗甘草炙秦艽洗去蘆附子炮去皮臍官桂不見火白芍藥各等分乾薑炮白茯苓去皮防風去釵股炙當歸去蘆薄切焙乾各一兩川獨活黃色如鬼眼者去蘆洗焙秤一兩三錢半上為粗末每服三錢水一盞半棗二個同煎至八分去滓空心食前服凡中風用續命排風風引竹瀝諸湯及神精丹茵芋酒之類更加以灸無不愈者然此疾積習之久非一日所能致皆大劑久而取效唐書載王太后中風喑默不語醫者蒸黃耆數斛以熏之得瘥蓋此類也今人服三五盞便求效責醫也亦速矣孟子曰七年之病三年之艾久而後知爾小續命湯小續命湯並增損法附子半兩炮去皮臍防風一兩半去釵股黃芩去皮麻黃去根節桂去皮生用甘草炙人參去蘆防己白芍藥芎藭杏仁浸湯去皮尖以上各一兩上為粗散每服五錢水二盞姜五片煎一盞去滓非時溫服若骨節煩痛有熱者去附子倍芍藥精神恍惚者加茯苓遠志各一兩煩心多驚者加犀角半兩骨間冷痛者倍用桂附嘔逆腹脹者倍人參加半夏一兩躁悶大便澀者去附子倍芍藥入竹瀝一合煎若臟寒下利者去防己黃芩倍附子合前成一兩加白朮一兩排風湯白蘚皮去心洗焙秤芍藥洗焙桂去皮不見火防風去釵股當歸洗焙川芎洗焙甘草炙杏仁浸湯去皮尖及雙仁者麩炒令黃白朮各二兩茯神去皮木麻黃去根節獨活去蘆洗焙秤以上各一兩上件同為末每服三錢水一盞半姜三片煎至八分去滓非時溫服小風引湯防風去釵股獨活去蘆洗焙秤細辛去葉川芎洗焙五味子揀白茯苓去皮人參去蘆白芍藥白朮甘草炙上一十味等分為末每服三錢水一盞姜三片杏仁五個去尖拍碎同煎等分非時去滓溫服如加麻黃蓯蓉附子當歸羚羊角五物等分即大風引湯也千金方竹瀝湯竹瀝二升生葛汁一升生薑汁三合上三味相和溫暖分三服平旦日晡夜各一服必用方竹瀝湯秦艽去土銼獨活黃色如鬼眼者去蘆洗焙秤防風洗銼附子炮去皮臍銼如指大各一兩上四味以水四盞煎至二盞入生地黃汁淡竹瀝各半盞煎至四五沸去滓分四服適溫熱服空心日午臨臥服病勢去即以他藥扶持未愈再作近世貴人用之多有神效增損茵芋酒茵芋葉川烏炮去皮石楠葉防風去釵股川椒去目微炒出汗女萎附子炮去皮臍細辛去葉獨活黃色如鬼眼者去蘆洗焙秤卷柏去根肉桂去皮天雄炮去皮臍秦艽去土防己以上各一兩躑躅花二兩當歸去蘆洗酒浸切焙二兩生乾地黃二兩芍藥一兩上一十八味㕮咀酒二斗漬之冬七日夏三日春秋各五日初服一合漸增之以知為度令酒氣相續太一神精丹治客忤霍亂腹痛脹滿屍疰惡風癲狂鬼語蠱毒妖魅癥瘕積聚溫瘧積久百方不瘥但是一切惡毒無所不治太一神精丹丹砂元州麻陽大塊有牆壁者雌黃柳州葉子者雄黃武都水窟通明如雞冠者先油煎九日九夜三味以醶醋浸之曾青潼川飛烏如蚯蚓屎如黃連者佳用好酒銅器漬紙密封曝百日急用五日亦可無日以火暖之磁石各四兩金牙二兩半上六味各搗羅如粉以醶醋拌使乾溼得所內土釜中六一泥固濟勿令泄氣候乾用鐵三腳子用泥作三個柱子亦妙隨釜之大小高不過一尺五寸其下置炭約三斤以漸益之常及五斤只在合底不得過口以五日火不絕為度火盡極冷水浸干泥令透然後出之藥飛凝釜上白如雪者為最五色者佳三色者次下者一色藥飛不盡與火如前以雄雞翼隨多少掃取研勻束膏丸如黍粒平旦空腹漿飲下一丸病甚加至二丸口噤者以物斡開不可開者琢去兩齒藥下即治男左女右絳囊帶九刀圭小兒系頭上闢瘴毒惡時氣射工小兒患苦酒和之塗方寸紙著兒心腹上土釜搗好甘土絹篩水和紙筋作泥隨藥多少為釜陰三十日曝三十日日夕番轉內釜糠中四向土欄擁之令糠周遍釜上下各七寸從下焚之五日夜去灰待冷取拭令淨醋和黃丹如稀粥掃其中厚一分如入藥諸大丹皆用此釜一具數十回用不動或用瓦盆兩枚隨其大小用六一泥塗之六一泥用赤石脂牡蠣滑石礬石黃礬各二兩取醶醋以足為度先作甘土泥各別裹五藥作團令勿泄氣火燒三日出火破團各搗篩然後與蚯蚓屎滷土各二兩以醋和如稠粥塗瓦盆中無滷土以鹽代之指迷方中六一泥法亦可參用鐵彈丸治一切癱瘓風乳香以乳缽坐水盆中研沒藥各一兩五靈脂揀如鼠屎者四兩上先將乳香沒藥於陰涼處當風細研更用研了麝香一錢將下一味為細末然後同前二味再碾令勻滴水為丸如彈子大瓷合收每服一粒薄荷酒磨下日三服黑神丸草烏頭不去皮生用五靈脂揀如鼠屎各等分上為末六月六日滴水為丸如彈子大四十歲以下分六服病甚一丸分二服薄荷酒磨下覺微麻為度定風餅子治風客陽經邪傷腠理背膂強直口眼喎斜體熱惡寒痰厥頭痛肉瞤筋惕辛頞鼻淵及酒飲過多嘔吐涎沫頭目眩暈如坐車船常服解五邪傷寒闢霧露瘴氣爽慧神志諸風不生天麻川烏去皮尖南星半夏川薑川芎白茯苓甘草各等分並生上細末生薑汁為丸如龍眼大作餅子生朱為衣每服一餅細嚼熱生薑湯下不拘時候熙豐間王丞相常服預防風疾神驗茯神散治膽虛冷目眩頭疼心神恐畏不能獨處胸中滿悶茯神一兩去木遠志去心防風去釵股細辛去葉白朮前胡去苗洗人參去蘆桂心不見火甘菊花去萼梗熟乾地黃酒灑九蒸九曝焙乾秤各三分枳殼半兩去穰麩炒黃上為細末每服三錢水一盞生薑三片同煎至六分溫服不拘老幼皆宜服鱉甲丸治膽虛不得眠四肢無力鱉甲淡醋煮去裙膜洗酸醋炙黃秤酸棗仁微炒去皮研羌活去蘆黃耆蜜水塗炙牛膝浸酒水洗焙乾人參去蘆五味子揀各等分上為細末煉蜜杵丸如梧子大每服三四十丸溫酒下補膽防風湯治膽虛目暗喉痛唾數眼目眩冒五色所障夢見被人訟恐懼面色變青防風十分去釵股人參六分去蘆細辛五分去葉芎藭甘草炙茯神去木獨活黃色如鬼眼者去蘆洗焙秤前胡各八分去苗淨洗上為粗末每服四大錢水一盞半棗二個煎至八分去滓食前服人參散治膽虛常多畏恐不能獨臥如人捕狀頭目不利人參去蘆枳殼去穰細切麩炒黃五味子揀桂心不見火各三分柏子仁研熟乾地黃酒灑九蒸九曝焙乾各一兩山茱萸連核甘菊花去萼梗茯神去木枸杞子各三分上為細末每服二錢溫酒調服醒後頭虛暈發熱方治肝厥狀如癇疾不醒嘔吐麻黃去根節鉤藤取皮石膏雪白硬者不煅乾葛半夏曲柴胡去苗洗甘草炙枳殼去穰麩炒黃甘菊去萼梗各等分上為粗末每服四錢水一盞半生薑三片棗一個同煎至八分去滓溫服
