body:
  text: 卷外椒紅丸治婦人血氣不調臟腑怯弱風冷邪氣乘虛客搏臍腹冷疼脅肋時脹面色萎黃肌體羸瘦怠情嗜臥不思飲食常服補虛損暖下臟逐痼冷進飲食沉香莪朮訶子煨去核椒紅微炒出汗當歸微炒附子炮去尖臍皮白朮各一兩麝香一分別研丁香肉豆蔻炮良薑切麻油炒各半兩上細末入麝香勻酒煮麵糊丸如梧桐子大每服十丸溫酒吞下空心食前勝紅丸莪朮三稜陳皮去白青皮去白縮砂炒香附子忌鐵乾薑炮丁皮去粗皮厚朴薑製炒各等分上細末煮麩糊為丸如梧桐子大每服五十丸生薑紫蘇湯送下不拘時候
