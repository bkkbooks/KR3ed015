body:
  text: 卷第九傷寒時疫下治結胸灸法陰毒傷寒關格不通腹脹喘促四肢逆冷亦依此灸之氣通可治巴豆十四枚黃連七寸和皮用上搗細用津唾和成膏填入臍心以艾灸其上腹中有聲其病去矣不拘壯數病去為度才灸了便以溫湯浸手帕拭之恐生瘡也鵲石散治傷寒發狂或棄衣奔走逾牆上屋黃連去須寒水石各等分上細末每服二錢濃煎甘草湯放冷調服桂枝麻黃各半湯方在前嘗記一親戚病傷寒身熱頭疼無汗大便不通已四五日予訊問之見醫者治大黃朴硝等欲下之予曰子姑少待予為視之脈浮緩臥密室中自稱其惡風予曰表證如此雖大便不通數日腹又不脹別無所苦何遽便下大抵仲景法須表證罷方可下不爾邪乘虛入不為結胸必為熱利也予作桂枝麻黃各半湯繼以小柴胡漐漐汗出大便亦通而解仲景云凡傷寒之病多從風寒得之始表中風寒入里則不消矣擬欲攻之當先解表乃可下之若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣元本正文重疊難曉予刪正此段其理甚明大抵風寒入里不消必有燥屎或大便堅秘須是脈不浮不惡風表證罷乃可下大便不通雖四五日不能為害若不顧表而便下遂為協熱利也抵當丸治瘀血水蛭五枚炙虻蟲五枚去翅足炒桃仁六枚去皮尖大黃去皮濕紙裹甑上蒸三分上為末煉蜜和作一丸以水一盞煎至七分頓服晬時當下血不下再作之有人病傷寒七八日脈微而沉身黃髮狂小腹脹滿臍下冷小便利予曰仲景云太陽病身黃脈沉結小腹硬小便不利者為無血也小便自利其人如狂者血證諦也投以抵當丸下黑血數升狂止得汗解經云血在上則忘在下則狂太陽膀胱隨經而蓄於膀胱故臍下膨脹由闌門滲入大腸若大便黑者此其症也大腸小腸會為闌門難經七衝門唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門大腸小腸會為闌門下極為魄門破陰丹在前有人初得病四肢逆冷臍下築痛身疼如被杖蓋陰症也急服金液破陰來復等丹其脈遂沉而滑沉者陰也滑者陽也病雖陰而見陽脈有可生之理仲景所謂陰病見陽脈者生也仍灸氣海丹田百壯手足溫陽回得汗而解或問滑脈之狀如何便有生理予曰仲景云翕奄沉名曰滑何謂也沉為純陰翕為正陽陰陽和合故令脈滑古人論滑脈雖云往來前卻流利度轉替替然與數相似仲景三語而足也此三字極難曉翕合也言張而復合也故曰翕為正陽沉言忽降而下也故曰沉為純陰方翕而合俄降而下奄謂奄忽之間仲景論滑脈可謂諦當矣然其言皆有法故讀者難曉金液丹硫黃十兩先飛煉去沙石秤研為細末用磁合子盛以水和赤石脂封口以鹽泥固濟燃干地下先埋一小罐子盛水令滿安合子在上用泥固濟了漫火養七日七夜候足加頂火一煅候冷取出研極細為末藥末一兩用蒸餅一兩湯浸握去水脈丸如梧桐子大每服三十丸多至百丸空心溫米飲下此藥固真氣暖丹田堅筋骨壯陽道除久寒痼冷補勞傷虛損治男子腰腎久冷心腹積聚脅下冷癖腹中諸蟲失精遺溺形羸力劣腳膝疼弱冷風頑痹上氣衄血咳逆寒熱霍亂轉筋虛滑下痢又治痔瘻濕䘌生瘡下血不止及婦人血結寒熱陰蝕疽痔又治傷寒陰證身冷脈微手足厥逆或吐或利或自汗不止或小便不禁不拘丸數宜並服之得身熱脈出為度來復丹本方不用玄精石其效尤速硝石一兩同硫黃細末入定鍱內微火漫炒柳篦子不住手攪令陰陽氣相入不可火太過恐傷藥力再研極細各二榖末舶上硫黃一兩透明不夾石者五靈脂二兩須擇五臺山者用水澄去砂石日乾淨研太陰玄精石一兩研細水飛陳橘皮二兩去白青橘皮二兩去白上用五靈脂二橘皮為細末次入玄精石末及前二榖末拌勻以好滴醋打糊丸如豌豆大每服三十粒空心粥飲下甚者五十粒小兒三五粒新生嬰兒一粒小兒慢驚風或吐利不止變成虛風搐搦者非風也胃氣欲絕故也用五粒研碎米飲送下老人伏熱迷悶紫蘇湯下婦人產後血逆上搶悶絕並惡露不止及赤白帶下並用醋湯下此藥治榮衛不交養心腎不升降上實下虛氣悶痰厥心腹冷痛臟腑虛滑不問男女老幼危急之證但有胃氣無不獲安補損扶虛救陰助陽為效殊勝常服和陰陽益神散腰腎陰濕止腹脅冷疼立見神效應諸疾不辨陰陽證者並宜服之中暑昏亂煩躁垂死急用新汲水調五苓散下五十粒立活氣海氣海一穴道家名曰丹田在臍下一寸五分任脈氣所發治臍下冷氣上衝心下氣結成塊婦人月事不調崩中帶下因產惡露不止繞臍㽲痛針入八分灸可百壯此男子生氣之海也臟氣虛憊真氣不足一切氣疾悉可灸之陰證傷寒不限壯數更於關元穴灸之以手和暖為度關元穴在第二卷治傷寒汗後脾胃傷冷物胸膈不快尋常血氣不和宜服補脾湯此即治中湯也補脾湯人參去蘆乾薑炮白朮甘草炙陳皮去白青皮去白等分上細末每服三錢水一盞煎數沸熱服入鹽點亦得記有人患傷寒得汗數日忽身熱自汗脈弦數心不得寧真勞復也予診曰勞心之所致神之所舍未復其初而又勞傷其神榮衛失度當補其子益其脾解發其勞庶幾得愈授以補脾湯佐以小柴胡得解或者難曰虛則補其母今補其子何也予曰子不知虛勞之異乎難經曰虛則補其母實則瀉其子此虛當補其母人所共知也千金曰心勞甚者補脾氣以益之脾旺則感於心矣此勞則當補其子人所未聞也蓋母生我者也子繼我而助我者也方治其虛則補其生者錦囊所謂本體得氣遺體受蔭同義方治其勞則補其助我者荀子所謂未有子富而父貧同義此治虛與勞所以異也白虎湯治中暍知母一兩半甘草半兩炙石膏四兩碎綿裹粳米一合半上銼如麻豆大每服五錢水一盞煮至八分去滓溫服有人頭疼身熱心煩躁渴診其脈大而虛予授以白虎湯數服愈仲景云脈虛身熱得之傷暑又云其脈弦細芤遲何也素問云寒傷形熱傷氣蓋傷氣不傷形則氣消而脈虛弱所謂弦細芤遲者皆虛脈也仲景以弦為陰朱肱亦曰中暑脈微弱則皆虛脈可知麻黃湯方在前有人病傷寒身熱頭痛予診之曰邪在表此表實證也當汗之以麻黃湯或人問曰傷寒大抵因虛故邪得以入之今邪在表何以雲表實也予曰古人稱邪之所湊其氣必虛留而不去其病則實蓋邪之入人也始因虛及邪居中則反為實矣大抵調治傷寒先要明表裡虛實能明此四字則仲景三百九十七法可坐而定也何以言之有表實有表虛有裡實有裡虛有表裡俱實有表裡俱虛予於表裡虛實歌中常論其事矣仲景麻黃湯之類為表實而設也桂枝湯之類為表虛而設也裡實則承氣之類是也裡虛則四逆之類是也表裡俱實所謂陽盛陰虛下之則愈也表裡俱虛所謂陽虛陰盛汗之則愈也嘗讀華佗傳有府吏倪尋李延共止俱頭痛身熱所苦正同佗曰尋當下之延當發汗或難其異佗曰尋內實延外實故治之異小柴胡湯柴胡二兩去苗淨洗黃芩去皮人參去蘆甘草各三分炙半夏六錢一字湯洗七次上粗末每服五錢水一盞半生薑五片棗二個同煎至八分去滓溫日三服若胸中煩而不嘔者去半夏人參加栝蔞實四分之一以一枚為率若渴去半夏加人參合前成一兩一錢栝蔞根一兩若腹中痛者去黃芩加芍藥三分若脅下痞硬去大棗加牡蠣一兩若心下悸小便不利去黃芩加茯苓一兩若不渴外有微熱者去人參加桂三分溫覆微汗愈若咳者去人參大棗生薑加五味子六錢一字乾薑二分記有人患傷寒五六日頭汗出自頸以下無汗手足冷心下痞悶大便秘結或者見四肢冷又汗出滿悶以為陰證予診其脈沉而緊予曰此症誠可疑然大便結非虛結也安得為陰脈雖沉緊為少陰症多是自利未有秘結者予謂此正半在裡半在表投以小柴胡得愈仲景稱傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里脈沉亦有里也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在外半在裡也脈雖沉緊不得為少陰所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解此疾症候同故得屎而解也有人難曰仲景云病人脈陰陽俱緊反汗出者亡陽也此屬少陰今云陰不得有汗何也今頭汗出者故知非少陰何以頭汗出便知非少陰證予曰此一段正是仲景議論處意謂四肢冷脈沉緊腹滿全似少陰然大便硬頭汗出不得為少陰蓋頭者三陽同聚若三陰至胸而還有頭汗出自是陽虛故曰汗出為陽微是陰不得有汗也若少陰頭有汗則死矣故仲景平脈法云心者火也名少陰其頭無汗者可治有汗者死蓋心為手少陰腎為足少陰相與為上下惟以意逆者斯可得之麻黃湯治太陽陽明合病方在前有人病傷寒脈浮而長喘而胸滿身熱頭痛腰脊強鼻乾不得臥予曰太陽陽明合病證仲景法中有三證下利者葛根湯不下利嘔逆者加半夏喘而胸滿者麻黃湯也治以麻黃得解有人問傷寒傳入之序自太陽陽明少陽太陰少陰厥陰所傳有次第何哉予曰仲景本論無說古今亦無言者惟龐安常謂陽主生故太陽水傳足陽明土土傳足少陽木為微邪陰主殺故足少陽木傳足太陰土土傳足少陰水水傳足厥陰木為賊邪予以為不然足少陰水傳足厥陰木安得為賊邪蓋牽強傅會失之穿鑿胡不觀素問陰陽離合論云太陽根起於至陰結於命門名曰陰中之陽陽明根起於厲兌名曰陰中之陽少陽根起於竅陰名曰陰中之少陽太陰根起於隱白名曰陰中之陰少陰根起於湧泉名曰陰中之少陰厥陰根起於大敦陰之絕陽名曰陰之絕陰其次序正與此合大抵傷寒始因中風寒得之於陰是以只傳足經者皆陰中之陽陰中之陰也不特此也以六氣在天者考之厥陰為初之氣少陰為二之氣太陰為三之氣少陽為四之氣陽明為五之氣太陽為終之氣此順也逆而言之太陽而後陽明陽明而後少陽少陽而後太陰太陰而後少陰少陰而後厥陰傷寒為病逆而非順故以是為序也小承氣湯大黃一兩去皮厚朴半兩去皮薑汁塗炙枳實二片去穰麩炒上三味銼如麻豆大每服三錢水一盞煮至三分去滓溫服以利為度初服須更衣者止後服未利再服洗當先炒厚朴枳實三大錢匕水一盞半煮至一盞又入大黃二錢再煮一沸去滓熱服有人病傷寒八九日身熱無汗時時譫語時因下利大便不通三日矣非煩非躁非寒非痛終夜不得臥但心中無曉會處或時發一聲如嘆息之狀醫者不曉是何症予診之曰此懊憹怫鬱二證俱作也胃中有燥屎宜承氣湯下燥屎二十餘枚得利而解仲景云陽明病下之心下懊憹微煩胃中有燥屎者可攻之又云病者小便不利大便乍難乍易時有微熱怫鬱不得臥者有燥屎也承氣湯主之素問云胃不和則臥不安此夜所以不得眠也仲景云胃中燥大便堅者必譫語此所以有時譫語也非躁非煩非寒非痛所謂心中懊憹也聲如嘆息而時發一聲所謂外氣怫鬱也燥屎得除大便通利胃中安和故其病悉去也又有人病傷寒大便不利日晡發潮熱手循衣縫兩手撮空直視喘急更數醫矣見之皆走予曰此誠惡候得之者十中九死仲景雖有證而無治法但云脈弦者生澀者死已經吐下難於用藥漫且救之若大便得通而脈弦者庶可治也與小承氣湯一服而大便利諸疾漸退脈且微弦半月愈或人問曰下之而脈弦者生此何意也予曰金匱玉函云循衣妄撮怵惕不安微喘直視脈弦者生澀者死微者但發熱譫語承氣湯主之予嘗觀錢仲陽小兒直訣云手尋衣領及捻物者肝熱也此證在玉函列於陽明部蓋陽明胃也肝有熱邪淫於胃經故以承氣瀉之且得弦脈則肝平而胃不受克此所以有生之理讀仲景論不能博通諸醫書以發明其隱奧專守一書者吾未見其能也又記有人病傷寒下利身熱神昏多困譫語不得眠或者見下利便以譫語為鄭聲為陰虛證予曰此小承氣證眾駭然曰下利而服小承氣仲景之法乎予曰此仲景之法也仲景云下利而譫語者有燥屎也屬小承氣湯而得解予嘗讀素問云微者逆之甚者從之逆者正治從者反治從少從多觀其事也帝曰何謂反治岐伯曰塞因塞用通因通用王冰注云大熱內結注瀉不止熱宜寒療結復未除以寒下之結散利止此通因通用也正合於此葛根湯治項背強葛根一兩麻黃三分去節桂枝去皮不見火甘草炙芍藥各半兩上粗末每服五錢水一盞半煎至八分去滓溫服覆汗為度有人患傷寒無汗惡風項既屈而且強予曰項強几几葛根湯證或人問曰何謂𠘧𠘧予曰𠘧𠘧者如凡足疾屈而強也謝復古謂病人羸弱須憑几而起誤也蓋仲景論中極有難曉處如振振欲擗地心中懊憹外邪怫鬱鬱冒不仁膈內拒痛如此之類甚多始得陰毒候熙寧中邠守宋迪因其猶子感傷寒之初不能辨其病症見其煩渴而汗多以涼藥解治之至於再三遂成陰毒六日卒迪痛悼之遂著陰毒形症訣三篇陰毒本因腎氣虛寒因欲事或食冷物後傷風內既伏陰外又感寒或先感外寒而伏內陰內外皆陰則陽氣不守遂發頭痛腰重腹痛眼睛疼身體倦怠而不甚熱四肢逆冷額上及手背冷汗不止或多煩渴精神恍惚如有所失三二日間或可起行不甚覺重診之則六脈俱沉細而疾尺部短小寸口或大六脈俱浮大或沉取之大而不甚疾者非陰症也若服涼藥過多則渴轉甚躁轉急有此病症者急服還陽退陰二藥即安惟補虛和氣而已宜服正元散退陰散五勝散陰症不宜發汗如氣正脈大身熱而未瘥用藥出汗無妨正元散治傷寒如覺傷寒吹著四肢頭目百骨節疼痛急煎此藥服如人行五里再服或連進三服出汗立瘥若患陰毒傷寒入退陰散半錢同煎或傷冷傷食頭昏氣滿及心腹諸疾服之無有不見效麻黃去節秤陳皮去白大黃生甘草炙乾薑炮肉桂去粗皮不見火芍藥附子炮去皮臍茱萸揀淨湯泡十次焙半夏湯洗七次各等分上麻黃加一半茱萸減一半同為末每服一大錢水一盞生薑三片棗一個煎至七分熱呷如出汗以衣被蓋覆切須候汗乾方去衣被如是陰毒不可用麻黃免更出汗秋末至春初大黃減半退陰散治陰毒傷寒手足逆冷脈沉細頭痛腰重連進三服小小傷冷每服一字入正元散內同煎入鹽一捻陰毒傷寒咳逆煎一服細細熱呷便止川烏炮去皮臍乾薑炮各等分上為粗末炒令轉色放冷再搗為細末每服一錢水一盞鹽一捻煎半盞去滓溫服五勝散治傷寒頭痛壯熱骨節疼痛昏沉困倦咳嗽鼻塞不思飲食兼治傷寒夾冷氣並慢陰毒神效方白朮甘草炙五味子揀石膏各四兩乾薑三兩半炮上為末每服二錢水八分盞入鹽少許同煎至六分通口服如冷氣相夾入薑棗煎或治陰毒病入艾少許同煎陰毒漸深候積陰感於下則微陽消於上故其候沉重四肢逆冷腹痛轉甚或咽喉不利或心下脹滿結硬躁渴虛汗不止或時狂言指甲面色青黑六脈沉細而一息七至以來有此證者速宜於氣海或關元二穴灸三二百壯以手足和暖為效仍服金液丹來蘇丹玉女散還陽散退陰散玉女散治陰毒氣攻上腹痛四肢逆冷惡候並治之川烏去皮臍冷水浸七日後薄切曝乾紙袋盛有患者取碾末一大錢入鹽一小錢水一盞半煎至七分通口服壓下陰毒所往如豬血相似未已良久再進一服還陽散治陰毒面色青四肢逆冷心躁腹痛用硫黃末新汲水調下二錢良久或寒一起或熱一起更看緊慢再服汗出瘥陰毒沉困候沉困之候與前漸深之候皆同而更加困重六脈附骨取之方有按之即無一息八至以上或不可數也至此則藥餌難為功矣但於臍中灼艾如半棗大三百壯以來手足不和暖者不可治也偶復和暖則以前硫黃及熱藥助之若陰氣散陽氣來即漸減熱藥而和治之以取瘥矣辨少陰脈緊證記有人患傷寒六七日心煩昏睡多吐小便白色自汗予診之寸口尺中俱緊予曰寒中少陰之經是以脈緊仲景云病人脈緊而汗出者亡陽也屬少陰法當咽痛而復下利蓋謂此也有難之曰脈訣緊脈屬七表仲景以緊脈屬少陰緊脈屬陽耶屬陰耶予曰仲景云寸口脈俱緊者清邪中於上焦濁邪中於下焦又云陰陽俱緊者口中氣出唇口乾燥蜷臥足冷鼻中涕出舌上滑胎勿妄治也又云緊則為寒又云諸緊為寒又云曾為人所難緊脈從何而來師云假令已汗若吐以肺裡寒故令脈緊假令咳者坐飲冷水故令脈緊假令下利以胃虛故令脈緊又云寸口脈微尺脈緊其人虛損多汗由是觀之則寒邪之氣入人經絡所致皆虛寒之脈也其在陽經則浮而緊在陰經則沉而緊故仲景云浮緊者名為傷寒又曰陽明脈浮而緊者必潮熱此在陽則浮而緊也在陰則沉而緊故仲景云寸口脈微尺脈緊其人虛損多汗則陰常在絕不見陽又云少陰脈緊至七八日自下利脈暴微手足反溫脈緊反去者此欲解也此在陰則沉而緊也仲景云浮為在表沉為在裡數為在腑遲為在臟欲知表裡臟腑先以浮沉遲數為定然後兼於脈而別陰陽也故論傷寒當以仲景脈法為準傷寒必本仲景猶兵家之本孫吳葬書之本郭氏三命之本珞琭壬課之本心鏡舍之而之他是猶舍規矩而求方圓舍律呂而合五音必乖繆矣予嘗作傷寒歌百篇其首篇曰傷寒脈證總論篇第一皆本仲景今謾錄於後大浮數動滑陽脈陰病見陽生可得沉澀弦微弱屬陰陽病見陰終死厄仲景云脈大浮數動滑此名陽也脈沉澀弱弦微此名陰也陰病見陽脈者生陽病見陰脈者死陰陽交互最難明輕重斟量當別白脈雖有陰陽須看輕重以分表裡輕手脈浮為在表表實浮而兼有力但浮無力表中虛自汗惡風常淅淅傷寒先要辨表裡虛實此四者為急仲景浮為在表沉為在裡然表症有虛有實浮而有力者表實也故無汗不惡風浮而無力者表虛也故自汗惡風重手脈沉為在裡裡實脈沉來亦實重手無力大而虛此是裡虛宜審的里症亦有虛實脈沉而有力者裡實也故腹滿大便不通沉而無力者裡虛也或泄利或陰症之類以上八句辨表裡虛實盡矣風則虛浮寒牢堅水停水滀必沉潛動則為痛數為熱支飲應須脈急弦太過之脈為可怪不及之脈亦如然仲景云風則虛浮寒則牢堅沉潛水滀支飲急弦動則為痛數則熱煩太過可怪不及亦然邪不空見中必有奸榮衛太盛名高章高章相搏名曰綱榮衛微時名惵卑惵卑相搏損名揚榮衛既和名緩遲緩遲名沉此最良九種脈中辨疾症長沙之訣妙難量仲景云寸口衛氣盛名曰高榮氣盛名曰章高章相搏名曰綱衛氣弱名曰惵榮氣弱名曰卑惵卑相搏名曰損衛氣和名曰緩榮氣和名曰遲緩遲相搏名曰沉大抵仲景論傷寒症候自是一家瞥瞥有如羹上肥此脈定知陽氣微縈縈來如蛛絲細卻是體中陰氣衰脈如瀉漆之絕者病人亡血更何疑仲景云脈瞥瞥如羹上肥者陽氣微也脈縈縈如蛛絲細者陽氣衰也脈綿綿如瀉漆之絕者亡血也陽氣衰千金作陰氣衰陽結藹藹如車蓋陰結循竿亦象之仲景云藹藹如車蓋者陽結也累累如循竿者陰結也陽盛則促來一止陰盛則結緩而遲此謂促結二脈也仲景云脈來緩時一止名曰結脈來數時一止名曰促陽盛則促陰盛則結縱橫逆順宜審察殘賊災怪要須知仲景云脈有相乘有縱有橫有逆有順何謂也曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也又問曰脈有殘賊何謂也師曰脈有弦緊浮滑沉澀此六者名殘賊能為諸脈作病也又問曰脈有災怪何謂也答曰舊時服藥今乃發作為災怪脈靜人病內虛故人安脈病曰行屍仲景云脈病人不病曰行屍以無主氣卒僕不知人人病脈不病名曰內虛以無穀神雖困無苦右手氣口當主氣主血人迎左其位氣口緊盛食必傷人迎緊盛寒邪熾左為人迎右為氣口人迎緊盛傷於寒氣口緊盛傷於食數為在腑遲為臟浮為在表沉在裡仲景云浮為在表沉為在裡數為在腑遲為在臟脈浮而緩風傷衛浮緊堅澀寒傷榮脈微大忌令人吐欲下猶防虛且細仲景云脈微不可吐虛細不可下沉微氣弱汗為難三者要須當審記孫用和云陰虛脈沉微而氣弱者不可汗汗下吐三候脈有不可行者切當審之陽加於陰有汗證左手沉微卻應未素問云陽加於陰謂之汗趺陽胃脈定死生仲景論言趺陽脈者十有八九太谿腎脈為根蒂傷寒必診太谿趺陽者謂人以腎脈胃脈為主仲景譏世人握手不及足者以此脈來六至或七至邪氣漸深須用意浮大晝加病屬陽沉細夜加分陰位九至以上來短促狀若湧泉無入氣更加懸絕漸無根命絕天真當死矣孫用和云脈及六至七至以上浮大晝加病沉細夜加病更及八至精氣消神氣亂必有散脫精神之候須切急為治療又加之九至十至雖和扁亦難治如八至九至加以懸絕懸絕者無根也如泉之湧脈無入氣天真絕而必死矣病人三部脈調勻大小浮沉遲數類此是陰陽氣已和勿藥自然應有喜仲景云寸口關上尺中三處大小浮沉遲數同等雖有寒熱不解此脈已和為必愈發熱惡寒近似傷寒者有五種脈浮而數其人發熱而惡寒者傷寒之候也脈浮而緊其人發熱惡寒或有痛處是欲為癰疽也脈浮按之反澀其人發熱而惡寒或膈實而嘔吐此是傷食也脈浮而滑其人發熱而背寒或頭眩而嘔吐此是風痰之證也脈浮而弦其人發熱而惡寒或思飲食此是欲作瘧證也能辨其脈又驗其證斯無誤也來蘇丹定喘治久嗽雄黃雌黃砒霜等分上為粗末入瓷罐子內盛勿令滿上以新瓷盞蓋頭赤石脂水調泥合縫候透干以炭火簇罐子盞內盛清水半盞水耗再添水自早至晚後住火經宿取出藥在盞底結成取下藥研細棗肉或蒸餅丸如麻子大非時溫湯下三丸加至五丸仍忌熱物少時
