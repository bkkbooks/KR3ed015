body:
  text: 普濟本事方治藥制度惣例菟絲子酒浸曝焙乾用紙條子同碾即便為末半夏沸湯浸至溫洗去滑換湯洗七遍薄切焙乳香掛窗孔中風乾研或用人指甲研或以乳缽坐水盆中研天雄附子灰火炮裂去皮臍用烏頭灰火炮裂去皮尖用牡蠣鹽泥固濟干火燒通赤去泥用鹿茸酥炙黃燎去毛諸角鎊治為細末方入藥蓯蓉牛膝水洗酒浸焙乾用破故紙蛇床子茴香炒令香桂去粗皮取心用不見火葶藶苦者隔紙炒香天麥二門冬略用水浥去心桃杏郁李仁皆去皮尖微炒杜仲去皮銼如豆炒令黑桑螵蛸塗酥慢火炙令香大黃以濕紙裹甑上蒸枳殼去穰細切麩炒黃厚朴去粗皮生薑汁製炒椒去目併合口微火炒地上出汗前胡柴胡藁本皆去苗淨洗諸花皆去萼及梗牡丹地骨皮去心阿膠碎之蛤粉炒成珠子石葦枇杷葉溫水浸刷去毛焙蛇蛻蟬蛻洗去土炙蟬去頭足露蜂房炙過用或炒過亦得巴豆去皮心膜細研新瓦上出油蛇黃炭火煅通赤醋淬三五度酸棗仁微炒去皮研石斛去根淨洗細銼酒炒當歸洗去蘆薄切焙乾後秤花蛇烏蛇肉酒浸去皮骨炙真珠母未鑽真珠也研如粉吳茱萸湯浸七次焙香附子麩炒舂去毛芫青斑蝥去頭足翅敗龜虎骨並酥炙殭蠶去絲嘴炒乾漆炒至大煙出防風去釵股者皂角去皮弦炙用茵芋去梗銼炒用木鱉子去殼研虎睛酒浸切焙威靈仙去苗洗紫蘇子淘洗曬乾續斷推去筋洗銼焙黃連去須用甘草炙澤瀉淨洗酒浸一宿炙乾不浸亦得乾薑炮蜈蚣去頭足蠍去毒水蛭炒焦柏子仁研茯神去木去皮細辛去苗洗神麯碎炒青皮去白茯苓黃芩去皮甘松洗土淨獨活須黃色如鬼眼者去蘆洗焙秤羌活升麻去蘆洗焙秤諸石皆細研水飛木香氣味辛辣特甚者可用近世蜀人採雲南根以亂真其性大寒利大小便本草謂之土青木香類證謂之獨行根又云土青木香不堪入藥凡醫書云青木香者皆當用木香遠志去心洗銼炒黃色或用甘草煮三四沸去蘆骨或生薑汁炒人參去蘆龍骨龍齒用黏舌者香白芷不見火麻黃去根節白蘚皮去心洗焙秤秦艽去土去苗洗焙秤竹瀝用新筀竹燒取之卷柏去根洗五靈脂如鼠屎者水淘去沙石日乾取末石菖蒲去須骨碎補洗去毛百草霜用燒草鍋底墨熟乾地黃酒灑九蒸九曝焙乾秤木通削去粗皮先碾為細末秤方可入藥鱉甲銼成小片先以淡醋煮去裙膜洗淨再以酸醋炙黃秤天南星須大者忌用虎掌藿香木香丁香諸香藥官桂香白芷之類皆不可見火如荊芥薄荷紫蘇亦然三物或急用並須紙七八重裹焙
