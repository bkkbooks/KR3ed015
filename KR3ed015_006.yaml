body:
  text: 卷外順氣木香散治氣不升降嘔逆噁心胸膈痞滿脅肋脹悶及酒食所傷噫氣吞酸心脾刺痛大便不調面黃肌瘦不思飲食兼療婦人血氣刺痛及一切冷氣繞臍撮痛良薑去蘆炒乾薑炮茴香炒陳皮去白縮砂肉桂去粗皮不見火丁皮不見火桔梗去蘆炒厚朴去粗皮薑製蒼朮米泔浸甘草炙各等分去乾薑丁皮厚朴加香附子青皮曰和氣散上細末每服二錢水一盞生薑三片棗二枚同煎八分稍熱服不拘時候或入鹽少許沸湯點服常服寬中和胃
