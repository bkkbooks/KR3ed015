body:
  text: 卷第四翻胃嘔吐霍亂附子散治翻胃附子一枚極大者坐於磚上四面著火漸漸逼熱淬入生薑自然汁中再用火逼再淬約盡薑汁半碗焙乾末之每服二錢水一盞粟米少許同煎七分不過三服鯽魚散大鯽魚一個去腸留膽納緑礬末填滿縫口以炭火炙令黃干為末每服一錢陳米飲調下日三服枇杷葉散定嘔吐利膈枇杷葉去毛人參去蘆各一分茯苓去皮半兩茅根二分半夏三分湯浸七次上細銼每服四錢水一盞半生薑七片漫火煎至七分去滓入檳榔末半錢和勻服之龐老方白朮散食後多吐欲作翻胃澤瀉白朮茯苓去皮各等分上為細末每服一錢湯調溫服竹茹湯治胃熱嘔吐乾葛三兩甘草三分炙半夏三分薑汁半盞漿水一升煮耗半上粗末每服五錢水二盞生薑三片竹茹一彈大棗一個同煎至一盞去滓溫服胃熱者手足心熱政和中一宗人病傷寒得汗身涼數日忽嘔吐藥與飲食俱不下醫者皆進丁香藿香滑石等藥下咽即吐豫曰此正汗後餘熱留胃脘孫兆竹茹湯政相當爾亟治藥與之即時愈良方槐花散亦相類槐花散治熱吐皂角去皮燒令煙絶白礬熬槐花炒黃黑色甘草炙上四味等分為末每服二錢白湯調下喜與李使君曾病嘔每食訖輒吐如此兩月服翻胃藥愈甚或謂有痰飲投半夏旋覆之類亦皆不驗幕下藥判官授此方服之即瘥又有一老青衣久病嘔與服之又瘥大凡吐多是膈熱熱且生涎此藥能化胃膈熱涎特有殊效青金丹治霍亂吐瀉不止及轉筋諸藥不效者一粒治一人硫黃一兩研水銀八錢上二味銚子內炒柳木篦子不住攪勻更以柳枝蘸冷醋頻頻灑候如鐵色法如青金塊方成刮下再研如粉留少半為散余以粽子尖三個醋約半盞研稀稠得所成膏和丸如雞頭大硃砂為衣每服一丸煎丁香湯磨化下熱服如服散子丁香湯調下一錢傷寒陰陽乘伏用龍腦冷水磨下日二三服香靈丸治嘔吐不止丁香好辰砂研飛各六錢五靈脂揀如鼠屎者淘去沙石日乾四錢上香脂先細末後入砂再研勻狗膽或豬膽為丸如雞頭大每服一丸生薑橘皮湯磨下臟腑泄滑及諸痢鞠藭丸治脾胃中風濕臟腑泄滑芎藭神麯碎炒白朮附子炮去皮臍各等分上為細末用糊丸如梧子大每服三五十丸米飲下左氏述楚子圍蕭蕭將潰申叔展告還無社曰有麥曲乎有山鞠藭乎鞠藭芎藭也意欲令逃水中以避禍是知芎藭能除濕豫嘗加朮附以制方治脾濕而泄者萬無不中此藥亦治飧泄素問云春傷於風夏必飧泄飧泄者食穀不化蓋春木旺時肝生風邪淫於脾經至夏飲冷當風故多飧泄此藥尤宜陳曲丸磨積止泄痢治心腹冷痛陳曲一兩半乾薑炮官桂不見火白朮厚朴去粗皮薑汁炙人參去蘆當歸去蘆薄切焙乾甘草炙各半兩上細末煉蜜丸如梧子大每服三四十丸酒或淡醋湯下空心食前日二服發時不時增數木香丸治冷氣下瀉木香半兩川烏生去皮尖一兩上細末醋糊丸如梧子大陳皮醋湯下三五十丸溫脾湯治痼冷在腸胃間連年腹痛泄瀉休作無時服諸熱藥不效宜先取去然後調治易瘥不可畏虛以養病也厚朴去粗皮薑製乾薑炮甘草桂心去皮不見火附子生去皮臍各半兩大黃生四錢碎切湯一盞漬半日搦去滓煎湯時和滓下上細銼水二升半煎八合後下大黃汁再煎六合去滓澄去腳不要晚食分三服溫服自夜至曉令盡不快食前更以乾薑丸佐之乾薑丸乾薑炮巴豆去心炒黃研大黃濕紙裹甑上蒸人參各一錢去蘆上除巴豆余為末同研煉蜜丸如梧子大服前湯時用湯吞下一丸米飲亦得有人因憂愁中傷食結積在腸胃故發吐利自後至暑月稍傷則發暴下數日不已玉函云下利至隔年月日不期而發者此為有積宜下之只用溫脾湯尤佳如難取可佐以乾薑丸後服白朮散白朮散白朮木香附子炮去皮臍人參去蘆各等分上細末每服二錢水一盞生薑三片棗一個煎六分溫服靈砂丹治積痢硇砂一分硃砂一分並研極細上另用黃蠟半兩巴豆三七粒去殼皮膜同於銀石器內重湯煮一伏時候巴豆紫色為度去二七粒只將一七粒與前來二味同再研極勻再熔蠟匱藥每旋丸緑豆大每服三丸至五丸水瀉生薑湯下白痢艾湯赤白痢烏梅湯服時須極空腹服畢一時方可吃食臨臥尤佳次食淡粥一日瘧疾乳香湯麵東服不發日晚間服此藥不動氣服之瀉者止痢者斷疼者愈有積者內化亦不動臟腑大凡痢有沉積者不先去其積雖安暫安後必為害嘗記陳侍郎涇仲庚戌秋過儀真求診初不覺有疾及診視則肝脈沉弦附骨取則牢豫曰病在左脅有血積必發痛陳曰誠如是前此守九江被召冒暑涉長江暨抵行朝血痢已數日矣急欲登對醫者以剛劑燥之雖得止數日臍下一塊大如杯不旬日如碗大發則不可忍故急請官祠以歸為之奈何豫曰積痢不可強止故血結於臍脅下非抵當丸不可渠疑而不肯服次年竟以此終抵當丸在第九卷中木香散治諸痢木香半兩用黃連半兩各銼同炒用甘草一兩炙罌粟殼半兩生薑半兩碎同炒上細末入麝少許研勻陳米飲下二錢佛智和尚傳云在關中嘗合以濟人治血痢尤奇五味子散治腎泄五味子二兩揀吳茱萸半兩細粒緑色者上二味同炒香熟為度細末每服二錢陳米飲下頃年有一親識每五更初欲曉時必溏痢一次如是數月有人云此名腎泄腎感陰氣而然得此方服之而愈訶子丸治脾胃不和泄瀉不止諸藥不效訶子去核川薑炮肉豆蔻龍骨木香赤石脂附子炮去皮臍上並等分為細末糊丸如梧子大每服四十丸米飲下虛熱風壅喉閉清利頭目利膈湯治虛煩上盛脾肺有熱咽喉生瘡雞蘇葉荊芥穗桔梗炒防風去叉股牛蒡子隔紙炒甘草各一兩炙人參半兩去蘆上細末每服一錢沸湯點服如咽痛口瘡甚者加殭蠶一兩國醫都君豫方川芎散治風盛膈壅鼻塞清涕熱氣攻眼下淚多眵齒間緊急作偏頭疼川芎洗柴胡去苗洗各一兩半夏曲甘草炙甘菊細辛去葉人參去蘆前胡去苗洗防風去叉股各半兩上為粗末每服四錢水一盞生薑四片薄荷五葉同煎至七分去滓溫服芎辛丸治頭痛面赤煩悶咽乾上膈風痰頭目暈昏百節疼痛背項拘急川芎洗防風去叉股殭蠶去絲嘴炒獨活黃色如鬼眼者去蘆洗焙稱各一兩天麻四兩桔梗炒三兩細辛去葉白附子炒羌活洗去蘆甘草炙各半兩薄荷荊芥穗各一兩半上細末煉蜜丸如彈子大每服一粒清茶酒嚼下食後通膈丸治上焦虛熱肺脘咽膈有氣如煙搶上黃連去須茯苓去皮人參各三兩去蘆硃砂一分水飛真腦子少許上細末研勻煉蜜丸如梧子大熟水下三五丸日二三服門冬丸治心經有熱麥門冬一兩水浥去心川黃連去須半兩上細末煉蜜丸如梧子大食後熟水下二三十丸千金地黃丸治心熱川黃連去須四兩粗末生地黃半斤研取汁連滓二味勻日乾上細末煉蜜丸如梧子大每服三十丸食後麥門冬湯下人參散治邪熱客於經絡肌熱痰嗽五心煩躁頭目昏痛夜多盜汗此藥補和真氣解勞倦婦人血熱虛勞骨蒸並皆治人參去蘆白朮白茯苓去皮柴胡去苗洗半夏曲當歸洗去蘆薄切焙乾稱赤芍藥乾葛甘草各一兩炙子芩半兩去皮上為細末每服三錢水一盞生薑四片棗二個煎至八分不拘時候帶熱服但是有勞熱證皆可服熱退即止大抵透肌解熱乾葛第一柴胡次之所以升麻葛根湯為解肌之冠也清氣散調榮衛順三焦治風壅消痰涎退煩熱前胡去苗洗柴胡去苗洗川芎洗枳殼去穰銼麩炒白朮青皮去白羌活去蘆獨活黃色如鬼眼者去蘆洗焙稱甘草炙茯苓去皮人參去蘆各等分上為末每服二錢水一盞荊芥一穗煎七分服此方敗毒散中去桔梗加白朮青皮增損亦有理用之良驗柴胡散治邪入經絡體瘦肌熱推陳致新解利傷寒時疾中暍伏暑柴胡四兩洗去苗甘草一兩炙上細末每服二錢水一盞同煎至八分食後熱服此藥冬月可以潤心肺止咳嗽除壅熱春夏可以御傷寒時氣解暑毒居常不可缺兼不以長幼皆可服之倉卒可以使得效地仙散治骨蒸肌熱解一切虛煩躁生津液地骨皮洗去心防風去叉股各一兩甘草炙一分濟生方地骨皮二兩防風一兩甘草炙半兩上㕮咀每服四錢水半盞薑五片同煎上細末每服二錢水一盞生薑三片竹葉七片煎至七分服信效一方增人參半兩雞蘇一兩甘草添一分腫滿水氣蠱脹葶藶丸治腹中有濕熱氣目下作腫如新臥起蠶之狀兩足脛微腫病在腎腎者少陰也標在肺肺者太陰也故中滿氣急咳嗽喘息有音每就臥則右脅有氣上衝肩腋與缺盆相牽引不快少思飲食甜葶藶半兩炒令香郁李仁湯去皮尖熬紫色稱三分二味別研如膏令極勻白朮半兩牽牛子半兩一半生一半熟用赤茯苓去皮桑白皮蜜炙銼羌活洗去土漢防己陳橘皮去白澤瀉以上各三分上細末與上二味同研煉蜜和入臼內治之丸如梧子大初服十丸空心晚食前日二服生薑橘皮湯下不知加至二三十丸以知為度實脾散治脾元虛浮腫大附子一個炮去皮臍草果子去皮乾薑炮各二兩甘草一兩炙大腹連皮六個木瓜一個去穰切片上用水於砂器內同煮一半以來擘開乾薑心內不白為度不得全令水乾恐近底焦取出銼焙為末每服空心日午用沸湯點服羌活散治水氣羌活洗去土蘿蔔子各等分上同炒香熟去蘿蔔子不用末之溫酒調下二錢一日一服二日二服三日三服取效嘉興主簿張昌時傳方大棗湯治四肢腫滿白朮三兩㕮咀每服半兩水一盞半大棗三枚拍破同煎至九分去滓溫服日三四服不拘時候茯苓散治腫滿小便不利郁李仁去皮尖微炒四錢檳榔二個赤茯苓去皮白朮甘遂切片炒各二錢橘皮一錢半去白上細末每服一錢薑棗湯調下又方厚朴去皮薑汁製炒半兩牽牛子五兩炒取末二兩上細末每服二錢煎薑棗湯調下知母湯治遊風攻頭面或四肢作腫塊知母一兩麻黃去根節黃耆蜜炙甘草炙羌活洗去土白朮枳殼去穰銼麩炒各半兩上粗末每服四錢水一盞半牛蒡子百粒研碎煎至七分溫服日三四覺冷不用牛蒡子有一達官其母年七十中風手足拘攣平日只是附子之類扶養一日面浮腫手背亦腫尋常有一國醫供藥診云是水病欲下大戟牽牛以導之其家大驚憂惶召豫議之豫曰素問稱面腫曰風足脛腫曰水此服附子大過正虛風生熱之證咽必噎塞膈中不利誠言豫乃進升麻牛蒡團參湯繼以知母湯三日悉愈升麻牛蒡團參湯升麻一兩去蘆牛蒡子二兩炒人參半兩去蘆上為粗末每服三錢水一盞煎七分非時服此藥能消腫祛風不動正氣一日可三服嘗見一醫書中論水蠱二病臍腹四肢悉腫者為水但腹脹四肢不甚腫者為蠱有中表一婦人患蠱病豫謂不可下當實脾不然之卒後入棺木腹與棺蓋平治蠱宜石中黃丸方在卷後腎臟風及足膝腰腿腳氣治腎臟風攻注腳膝方連珠甘遂一兩木鱉子二個一雌一雄去殼研上為末獖豬腰子二個破開藥末一錢摻勻濕紙裹數重漫火煨熟放溫五更初細嚼米飲下積水多則利多少則少也宜軟飯將息若患一腳切看左右如左腳用左邊腰子上用右邊者藥末只一錢壬子年在毗陵有姓馬人鬻油久不見因詢其親云宿患腎臟風今一足發腫如瓠自腰以下巨細通為一律痛不可忍臥欲轉側則兩人挾持方可動或者欲以鈹刀決之豫曰未可豫有藥當合以贈如上法服之辰巳間下膿如水晶者數升即時痛止腫退一月後尚拄拐而行豫再以赤烏散令塗貼其膝方愈後十年過毗陵率其子列拜以謝云向腳疾至今不復作雖積年腎臟風並已失今健步不苦矣烏頭丸治腎臟風上攻下疰生瘡並癬川烏二兩去皮尖草烏一兩二味以黑豆半斤煮透軟去皮臍片切日乾地龍去土稱白附子炮天麻各半兩上為細末酒糊丸如梧子大每服二三十丸空心食前鹽湯鹽酒吞下虎骨酒去風補血益氣壯筋骨強腳力虎脛骨真者酒浸酥炙萆薢牛膝洗淨銼焙酒浸一宿再焙仙靈脾薏苡仁熟乾地黃酒灑九蒸九曝焙乾稱各二兩上細銼絹袋盛浸酒二斗飲可一盞入酒一盞可得百日婦人去牛膝檳榔湯治腳氣檳榔三錢生薑三片紫蘇七葉陳皮三枚上以水一大盞煎七分去滓稍熱服少府監韓正彥暴得疾手足不舉諸醫以為風針灸臂腿不知痛孫兆作腳氣與此藥乃愈地黃丸益氣血補肝腎祛風濕壯腳膝熟乾地黃酒灑九蒸九曝焙乾一兩牛膝洗銼焙酒浸一宿再焙石斛洗去根各三分肉蓯蓉水洗酒浸切片焙茵芋去梗銼炒防風去叉股川芎洗五味子揀桂心不見火附子炮去皮臍薏苡仁各半兩炒上為末煉蜜丸如桐子大每服三四十丸酒吞下空心食前虎骨酒治腳腰疼痛攣急不得屈伸及腿膝冷麻虎骨一具及脛骨二莖用酥塗炙黃捶碎同無灰酒三斗密封七日空心晚食前溫之隨意飲思仙續斷丸治肝腎風虛氣弱腳膝不可踐地腰脊疼痛風毒流疰下經行止艱難小便餘瀝此藥補五臟內傷調中益精涼血堅強筋骨益智輕身耐老思仙木即杜仲也去皮銼炒令黑五兩五加皮防風去叉股薏苡仁羌活洗去土川續斷洗銼焙乾牛膝洗銼焙酒浸一宿再焙各三兩萆薢四兩生乾地黃五兩上細末好酒三升化青鹽三兩用大木瓜半斤去皮子以鹽酒煮木瓜成膏和杵丸如桐子大每服五十丸空心食前溫酒鹽湯下膏子少益以酒糊續骨丹治兩腳軟弱虛羸無力及小兒不能行天麻明淨大者酒浸一夕白附子炮牛膝洗銼焙酒浸一宿再焙木鱉子去殼研各半兩烏頭炮去皮臍一分川羌活洗去土半兩地龍去土稱一分滴乳香乳鉢坐水盆中研細真沒藥研各二錢硃砂水飛一錢上以生天南星末一兩無灰酒煮糊丸如雞頭大硃砂為衣薄荷湯磨一粒食前服茵芋丸治風氣積滯成腳氣常覺微腫發則或痛茵芋葉銼炒薏苡仁各半兩郁李仁去皮尖微炒一兩牽牛子三兩生取末一兩半上細末煉蜜丸如梧子大每服二十丸五更薑棗湯下未利加至三十丸日三快利為度白粥補薏苡仁丸治腰腳走注疼痛此是腳氣薏苡仁茵芋去梗銼炒白芍藥牛膝洗銼焙酒浸一宿再焙川芎洗丹參去蘆防風去叉股獨活黃色如鬼眼者去蘆洗焙稱各半兩側子一枚炮去皮臍熟乾地黃酒灑九蒸九曝焙稱桂心不見火橘皮各一兩上細末煉蜜丸如梧子大每服三四十丸酒下食前日三服木瓜湯下亦得今人謂之腳氣者黃帝所謂緩風濕痹也千金云頑弱名緩風疼痛為濕痹大抵此疾不可以三五服便效須久服得力唐張文仲云風有一百二十四種氣有八十種唯腳氣頭風上氣常須服藥不絶自余則隨其發動臨時消息但有風氣之人春末夏初及秋暮得通泄則不困劇所謂通泄者如麻黃牽牛郁李仁之類是也不必苦快利藥也鹿茸丸治腎虛腰痛鹿茸不拘多少切作片子酥炙黃末之酒糊丸如梧子大空心食前鹽湯下三五十丸藥棋子治腰腿痛氣滯牽牛不拘多少用新瓦入火爆得通赤便以牽牛頓在瓦上自然一半生一半熟不得撥動取末一兩入細研硫黃一分同研勻分三分每用白麵一匙水和捍開切作棋子五更初以水一盞煮熟連湯溫送下住即已未住隔日再作豫嘗有此疾每發只一服痛止病源曰腿腰痛者或墮傷腰是以痛紫金丹萬金方治十種水氣禹餘糧三兩針砂五兩須是真者市中所賣多雜砂鐵屑最宜揀擇先用水淘洗極淨控去水更以銚子盛炒乾方同禹餘糧一處用酸醋三升就銚子內煮醋乾為度卻並銚子入一稱炭火中燒二物銚子炭火一般通赤淨掃磚地傾藥地上候冷一處研至無聲須極細如粉止蛇黃三兩大者用新鐵銚子盛入一稱炭火中燒蛇黃銚子炭火一般通赤鐵鉗取銚子便傾蛇黃入酸米醋二升中候冷取出研至無聲須極細如粉止治水多是轉下冷藥惟此方以三物為主既非大戟甘遂葶藶芫花之比又能量人虛實老壯入下項藥十六味以扶養之所以至老極虛之人皆可服木香銼炒肉豆蔻麵裹炮當歸去蘆洗銼用酒浸一宿白茯苓羌活銼略炒川芎略炒白蒺藜炒去角官桂去粗皮不見火京三稜炮乾薑炮白朮土茴香略炒青橘皮去穰炒附子炮去皮臍牛膝去苗酒浸一宿焙莪朮炮以上各半兩虛人老人全用半兩氣血壯實者減之更全在斟酌入前三物內上拌極勻以湯浸蒸餅捩去水和藥再搗極勻丸如梧桐子大空心食前溫酒或白湯下三五十粒惟忌鹽三月日雖毫末許不得入口若無以為口味即水病去後且以醋少許調和飲食可也仙居湛新道人傳此方病者不能忌鹽不若勿服徒勞無功果欲去病杜死求生須依此去鹽至誠服之並不動臟腑只於小便內旋去水病初去每日須服此藥一兩兼以溫補脾元氣血藥調理自然向安此方見當塗楊氏家藏方及夷陵集驗方謂之禹餘糧丸禹餘糧即石中黃名異而方實同但少白朮一味然當用之嶽州都監李松年病水氣通判陳君子欣以是與之不終劑而疾愈
